<meta name="apple-mobile-web-app-title" content="OOG CRM">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#E7E7E7;--surface:#fff;--border:#D0D0D0;--accent:#FF2400;--text-primary:#1a1a1a;--text-secondary:#6b6b6b;--text-hint:#9b9b9b;--pad:16px;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);}
/* PC 중앙 정렬 래퍼 */
.app-outer{min-height:100svh;background:#D0D0D0;display:flex;justify-content:center;}
.app{display:flex;flex-direction:column;min-height:100svh;background:var(--bg);width:100%;max-width:640px;position:relative;box-shadow:0 0 40px rgba(0,0,0,0.12);}
/* 하단 탭바 */
.bottom-tab-bar{display:flex;background:var(--surface);border-top:0.5px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 6px;cursor:pointer;border:none;background:transparent;color:var(--text-hint);font-size:10px;font-weight:500;gap:3px;outline:none;-webkit-appearance:none;}
.btab svg{transition:transform 0.15s;}
.btab.active{color:#FF2400;}
.btab.active svg{transform:scale(1.1);}
.btab:active{opacity:0.6;}
.nav{background:var(--surface)!important;border-bottom:0.5px solid var(--border);display:flex;align-items:center;height:52px;padding:0 var(--pad);flex-shrink:0;}
.nav-left{display:flex;align-items:center;min-width:80px;}
.nav-center{flex:1;display:flex;align-items:center;justify-content:center;}
.nav-title{font-size:17px;font-weight:500;color:var(--text-primary);}
.nav-right{display:flex;align-items:center;justify-content:flex-end;min-width:80px;gap:6px;}
.nav-btn{background:#FF2400!important;color:#fff!important;border:none!important;border-radius:8px!important;font-size:13px!important;font-weight:500!important;padding:7px 12px!important;cursor:pointer!important;display:inline-flex!important;align-items:center!important;gap:4px!important;white-space:nowrap!important;outline:none!important;-webkit-appearance:none!important;}
.nav-btn:hover{background:#e01f00!important;}
.nav-btn:active{opacity:0.8!important;}
.nav-btn.secondary{background:#f0f0f0!important;color:#1a1a1a!important;}
.nav-btn.secondary:hover{background:#e0e0e0!important;}
.tab-bar{display:flex;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.tab{flex:1!important;padding:11px 0!important;font-size:12px!important;text-align:center!important;cursor:pointer!important;border:none!important;border-bottom:2px solid transparent!important;background:#fff!important;color:#1a1a1a!important;outline:none!important;-webkit-appearance:none!important;}
.tab.active{color:#1a1a1a!important;border-bottom:2px solid #FF2400!important;font-weight:500!important;}
.tab:hover{background:#f5f5f5!important;}
.content{flex:1;overflow:auto;padding:var(--pad);}
.search-bar{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:15px;width:100%;color:var(--text-primary);margin-bottom:10px;}
.customer-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:14px var(--pad);margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;}
.customer-card:active{opacity:0.7;}
.avatar{width:42px;height:42px;border-radius:50%;background:#FFE8E5;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:#c41c00;flex-shrink:0;}
.avatar.female{background:#f5e8ff;color:#6b2fa0;}
.cname{font-size:15px;font-weight:500;color:var(--text-primary);}
.cmeta{font-size:12px;color:var(--text-secondary);margin-top:2px;}
.cbadge{font-size:11px;background:#FFE8E5;color:#c41c00;padding:2px 8px;border-radius:99px;}
.section-label{font-size:11px;color:var(--text-hint);font-weight:500;letter-spacing:0.06em;margin:18px 0 8px;text-transform:uppercase;}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:var(--pad);margin-bottom:12px;}
.field-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid #EBEBEB;}
.field-row:last-child{border-bottom:none;}
.field-label{font-size:13px;color:var(--text-secondary);}
.field-value{font-size:13px;color:var(--text-primary);font-weight:500;text-align:right;max-width:60%;}
.chart-wrap{position:relative;width:100%;height:200px;margin-top:8px;}
.chart-legend{display:flex;gap:16px;margin-bottom:8px;font-size:12px;color:var(--text-secondary);}
.legend-dot{width:10px;height:3px;border-radius:2px;display:inline-block;}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.metric{background:#F5F5F5;border-radius:10px;padding:12px;}
.metric-label{font-size:12px;color:var(--text-secondary);margin-bottom:4px;}
.metric-value{font-size:18px;font-weight:500;color:var(--text-primary);}
.metric-sub{font-size:11px;color:var(--text-hint);}
.action-btn{border:0.5px solid var(--border)!important;background:#fff!important;border-radius:10px!important;padding:11px var(--pad)!important;font-size:14px!important;color:#1a1a1a!important;cursor:pointer!important;width:100%!important;margin-bottom:8px!important;text-align:left!important;display:block!important;-webkit-appearance:none!important;outline:none!important;}
.action-btn:active{opacity:0.6!important;}
.action-btn.primary{background:#FF2400!important;color:#fff!important;border-color:#FF2400!important;}
.action-btn.danger{background:#fff!important;color:#FF2400!important;border-color:#FF2400!important;}
.msg-box{background:#F5F5F5;border:0.5px solid var(--border);border-radius:10px;padding:var(--pad);font-size:13px;color:var(--text-primary);line-height:1.75;margin-bottom:10px;white-space:pre-wrap;}
.tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:99px;margin-right:4px;margin-bottom:4px;}
.tag.blue{background:#FFE8E5;color:#c41c00;}
.tag.green{background:#F0F7EC;color:#2d5a1b;}
.tag.amber{background:#FFF4E0;color:#7a4800;}
.form-row{margin-bottom:12px;}
.form-label{font-size:12px;color:var(--text-secondary);margin-bottom:4px;}
.form-input{width:100%;background:#F5F5F5;border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text-primary);-webkit-appearance:none;appearance:none;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.eye-table{width:100%;font-size:12px;border-collapse:collapse;}
.eye-table th{color:var(--text-secondary);font-weight:500;padding:6px 8px;text-align:center;background:#F5F5F5;}
.eye-table td{padding:6px 8px;text-align:center;border-bottom:0.5px solid #EBEBEB;color:var(--text-primary);}
.sort-bar{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;}
.sort-bar::-webkit-scrollbar{display:none;}
.sort-btn{flex-shrink:0;border:0.5px solid var(--border)!important;background:#fff!important;border-radius:20px!important;padding:6px 13px!important;font-size:12px!important;color:var(--text-secondary)!important;cursor:pointer!important;white-space:nowrap!important;-webkit-appearance:none!important;outline:none!important;}
.sort-btn.active{background:#1a1a1a!important;color:#fff!important;border-color:#1a1a1a!important;font-weight:500!important;}
.sort-btn:hover:not(.active){background:#f0f0f0!important;}
.index-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
.idx-btn{border:0.5px solid var(--border)!important;background:#fff!important;border-radius:6px!important;padding:5px 9px!important;font-size:12px!important;color:var(--text-secondary)!important;cursor:pointer!important;-webkit-appearance:none!important;outline:none!important;font-weight:500!important;min-width:32px!important;text-align:center!important;}
.idx-btn.active{background:#FF2400!important;color:#fff!important;border-color:#FF2400!important;}
.idx-btn:hover:not(.active){background:#f0f0f0!important;}
.section-divider{font-size:11px;color:var(--text-hint);font-weight:600;letter-spacing:0.08em;padding:6px 2px 4px;margin-top:4px;}
.edit-btn{border:0.5px solid var(--border)!important;background:#fff!important;border-radius:7px!important;padding:4px 10px!important;font-size:11px!important;color:var(--text-secondary)!important;cursor:pointer!important;-webkit-appearance:none!important;outline:none!important;flex-shrink:0;}
.edit-btn:active{opacity:0.6!important;}
.alarm-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:14px var(--pad);margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;}
.alarm-card:active{opacity:0.7;}
.alarm-badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;flex-shrink:0;}
.alarm-badge.week{background:#FFF4E0;color:#7a4800;}
.alarm-badge.month{background:#FFE8E5;color:#c41c00;}
.alarm-badge.year{background:#F0F7EC;color:#2d5a1b;}
.alarm-filter-bar{display:flex;gap:6px;margin-bottom:12px;}
.alarm-filter-btn{flex:1;border:0.5px solid var(--border)!important;background:#fff!important;border-radius:20px!important;padding:7px 0!important;font-size:12px!important;color:var(--text-secondary)!important;cursor:pointer!important;text-align:center!important;-webkit-appearance:none!important;outline:none!important;}
.alarm-filter-btn.active{background:#1a1a1a!important;color:#fff!important;border-color:#1a1a1a!important;font-weight:500!important;}
.stats-tab-bar{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;}
.stats-tab-btn{flex-shrink:0;border:0.5px solid var(--border)!important;background:#fff!important;border-radius:20px!important;padding:7px 13px!important;font-size:12px!important;color:var(--text-secondary)!important;cursor:pointer!important;text-align:center!important;-webkit-appearance:none!important;outline:none!important;}
.stats-tab-btn.active{background:#1a1a1a!important;color:#fff!important;border-color:#1a1a1a!important;font-weight:500!important;}
.stats-summary{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;text-align:center;}
.stats-amount{font-size:28px;font-weight:600;color:var(--text-primary);margin:4px 0;}
.stats-label{font-size:12px;color:var(--text-secondary);}
.stats-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid #EBEBEB;}
.stats-row:last-child{border-bottom:none;}
.rank-num{font-size:13px;font-weight:700;color:var(--text-hint);width:24px;flex-shrink:0;}
.rank-num.gold{color:#b8860b;}
.rank-num.silver{color:#888;}
.rank-num.bronze{color:#cd7f32;}
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100svh;background:var(--bg);padding:32px var(--pad);}
.login-card{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:360px;border:0.5px solid var(--border);}
.login-logo{display:block;height:36px;margin:0 auto 24px;}
.login-title{font-size:18px;font-weight:600;color:var(--text-primary);text-align:center;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text-secondary);text-align:center;margin-bottom:24px;}
.login-error{font-size:12px;color:#FF2400;text-align:center;margin-top:8px;min-height:18px;}
.spinner{width:24px;height:24px;border:2px solid #eee;border-top:2px solid #FF2400;border-radius:50%;animation:spin .7s linear infinite;margin:40px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.admin-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid #EBEBEB;}
.admin-row:last-child{border-bottom:none;}
.admin-name{font-size:14px;font-weight:500;color:var(--text-primary);}
.admin-email{font-size:12px;color:var(--text-secondary);margin-top:2px;}
.chip{font-size:10px;padding:2px 8px;border-radius:99px;background:#FFE8E5;color:#c41c00;font-weight:500;}
.pay-toggle{display:flex;gap:8px;margin-top:4px;}
.pay-btn{flex:1;padding:9px 0;border:0.5px solid var(--border)!important;border-radius:8px!important;background:#F5F5F5!important;color:var(--text-secondary)!important;font-size:13px!important;cursor:pointer!important;-webkit-appearance:none!important;outline:none!important;}
.pay-btn.active{background:#FF2400!important;color:#fff!important;border-color:#FF2400!important;font-weight:500!important;}
.discount-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
</style>
</head>

function switchMainTab(tab){
  currentMainTab=tab;
  // 탭 버튼 활성화
  ['home','customers','alarm','stats'].forEach(t=>{
    const el=document.getElementById('btab-'+t);
    if(el)el.classList.toggle('active',t===tab);
  });
  // 상단 탭바(고객 상세용) 숨기기
  document.getElementById('tab-bar').style.display='none';
  // 탭별 렌더
  if(tab==='home') renderHome();
  else if(tab==='customers') renderList();
  else if(tab==='alarm') showAlarmPage();
  else if(tab==='stats') showStatsPage();
}

async function doLogin(){

const INITIALS=['전체','ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function getInitial(name){
  const code=name.charCodeAt(0)-0xAC00;
  if(code<0||code>11171)return name[0];
  return ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'][Math.floor(code/28/21)];
}
function getNormInitial(ch){return {'ㄲ':'ㄱ','ㄸ':'ㄷ','ㅃ':'ㅂ','ㅆ':'ㅅ','ㅉ':'ㅈ'}[ch]||ch;}
function buildIndexBar(){
  const bar=document.getElementById('index-bar');if(!bar)return;
  const used=new Set(customers.map(c=>getNormInitial(getInitial(c.name))));
  const btns=['전체',...INITIALS.slice(1).filter(i=>used.has(i))];
  bar.innerHTML=btns.map(i=>`<button class="idx-btn${currentIndex===i?' active':''}" onclick="setIndex('${i}')">${i}</button>`).join('');
}
function setSort(s){
  currentSort=s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('sort-'+s);if(el)el.classList.add('active');
  applyListFilter();
}
function setIndex(i){
  currentIndex=i;
  document.querySelectorAll('.idx-btn').forEach(b=>b.classList.toggle('active',b.textContent.trim()===i));
  applyListFilter();
}
let _productSearchTimer=null;
function applyListFilter(){
  const q=(document.getElementById('search-input')||{}).value||'';
  const resultEl=document.getElementById('search-product-result');

  // 이름/연락처로 먼저 필터
  let list=customers.filter(c=>c.name.includes(q)||(c.phone||'').includes(q));

  // 2글자 이상이고 이름/연락처 결과가 없으면 상품명 검색 실행
  if(q.length>=2&&list.length===0){
    if(resultEl)resultEl.textContent='상품명 검색 중...';
    clearTimeout(_productSearchTimer);
    _productSearchTimer=setTimeout(()=>searchByProduct(q),400);
    return;
  }

  // 이름/연락처 결과 있거나 검색어 짧으면 일반 필터
  if(resultEl)resultEl.textContent='';
  if(currentIndex!=='전체')list=list.filter(c=>getNormInitial(getInitial(c.name))===currentIndex);
  if(currentSort==='name')list=[...list].sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  else if(currentSort==='visit')list=[...list].sort((a,b)=>(b.last_visit||'').localeCompare(a.last_visit||''));
  else if(currentSort==='count')list=[...list].sort((a,b)=>b.visits-a.visits);
  renderCustomerCards(list);
}

async function searchByProduct(q){
  const resultEl=document.getElementById('search-product-result');
  // purchases 테이블에서 해당 상품명 포함하는 구매내역의 customer_id 조회
  const [{data:d1},{data:d2},{data:d3},{data:d4}]=await Promise.all([
    sb.from('purchases').select('customer_id').ilike('frame_item','%'+q+'%'),
    sb.from('purchases').select('customer_id').ilike('frame_item_b','%'+q+'%'),
    sb.from('purchases').select('customer_id').ilike('lens_item','%'+q+'%'),
    sb.from('purchases').select('customer_id').ilike('lens_item_b','%'+q+'%'),
  ]);
  const ids=new Set([...(d1||[]),...(d2||[]),...(d3||[]),...(d4||[])].map(r=>r.customer_id).filter(Boolean));
  if(!ids.size){
    if(resultEl)resultEl.textContent='검색 결과가 없습니다.';
    renderCustomerCards([]);return;
  }
  const list=customers.filter(c=>ids.has(c.id));
  if(resultEl){
    resultEl.style.color='#FF2400';
    resultEl.textContent=`"${q}" 구매 고객 ${list.length}명`;
  }
  renderCustomerCards(list);
}
function renderCustomerCards(list){
  const el=document.getElementById('customer-list');if(!el)return;
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:40px 0;color:var(--text-hint);font-size:14px;">고객이 없습니다</div>';return;}
  let html='',lastInit='';
  list.forEach(cu=>{
    if(currentSort==='name'){
      const init=getNormInitial(getInitial(cu.name));
      if(init!==lastInit){html+=`<div class="section-divider">${init}</div>`;lastInit=init;}
    }
    html+=`<div class="customer-card" onclick="openDetail('${cu.id}')">
      <div class="avatar ${cu.gender==='female'?'female':''}">${cu.name[0]}</div>
      <div style="flex:1;min-width:0;">
        <div class="cname">${cu.name}</div>
        <div class="cmeta">${cu.phone||'—'} · 최근방문 ${cu.last_visit||'—'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="cbadge">방문 ${cu.visits||0}회</div>
        <svg width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1l5 5-5 5" stroke="#C0C0C0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

async function saveInfoEdit(){
  const cu=currentCustomer;
  const g=id=>{const v=document.getElementById(id);return v?v.value.trim()||null:null;};
  const updates={name:g('ei-name')||cu.name,gender:document.getElementById('ei-gender').value,birth:g('ei-birth'),phone:g('ei-phone'),email:g('ei-email'),address:g('ei-address')};
  const {error}=await sb.from('customers').update(updates).eq('id',cu.id);
  if(error){alert('저장 실패: '+error.message);return;}
  Object.assign(cu,updates);
  const idx=customers.findIndex(c=>c.id===cu.id);if(idx>=0)customers[idx]=cu;

async function deleteCustomer(){
  const cu=currentCustomer;
  if(!confirm('"'+cu.name+'" 고객을 삭제할까요?\n검안기록과 구매내역도 모두 삭제됩니다.'))return;
  await sb.from('exams').delete().eq('customer_id',cu.id);
  await sb.from('purchases').delete().eq('customer_id',cu.id);
  const {error}=await sb.from('customers').delete().eq('id',cu.id);
  if(error){alert('삭제 실패: '+error.message);return;}
  customers=customers.filter(c=>c.id!==cu.id);
  currentCustomer=null;showingDetail=false;renderList();
}

function applyMinus(v){if(!v)return null;v=v.trim();if(v.startsWith('+')||v.startsWith('-'))return v;return '-'+v;}
function applyCyl(v){if(!v)return null;v=v.trim();return '-'+v.replace(/^[+-]/,'');}
function applyPlus(v){if(!v)return null;v=v.trim();if(v.startsWith('+'))return v;return '+'+v.replace(/^-/,'');}

async function saveExam(){
  const cu=currentCustomer;
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim()||null:null;};
  const addVal=applyPlus(g('re-add')||g('le-add'));
  const newExam={
    customer_id:cu.id,date:g('exam-date')||new Date().toISOString().split('T')[0],
    re_va:g('re-va'),le_va:g('le-va'),
    re_sph:applyMinus(g('re-sph')),re_cyl:applyCyl(g('re-cyl')),re_ax:g('re-ax'),
    le_sph:applyMinus(g('le-sph')),le_cyl:applyCyl(g('le-cyl')),le_ax:g('le-ax'),
    add_power:addVal,pd:g('pd'),
    phoria_far:g('phoria-far'),phoria_near:g('phoria-near'),
    vergence_far:g('vergence-far'),vergence_near:g('vergence-near'),
    accommodation_re:g('acc-re'),accommodation_le:g('acc-le'),accommodation_both:g('acc-both'),
    facility_re:g('fac-re'),facility_le:g('fac-le'),facility_both:g('fac-both'),
    npc:g('npc'),comment:g('exam-comment')
  };
  const {data,error}=await sb.from('exams').insert(newExam).select().single();
  if(error){alert('저장 실패: '+error.message);return;}
  cu.exams.push(data);cu.exams.sort((a,b)=>a.date.localeCompare(b.date));
  await updateVisitCount(cu);renderExamTab(cu);
}

        <button class="action-btn primary" onclick="saveExamEdit(${idx})" style="margin-bottom:0;">저장</button>

async function saveExamEdit(idx){
  const cu=currentCustomer;
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim()||null:null;};
  const addVal=applyPlus(g('ee-add-'+idx)||g('ee-add2-'+idx));
  const updates={
    date:g('ee-date-'+idx),
    re_va:g('ee-re-va-'+idx),le_va:g('ee-le-va-'+idx),
    re_sph:applyMinus(g('ee-re-sph-'+idx)),re_cyl:applyCyl(g('ee-re-cyl-'+idx)),re_ax:g('ee-re-ax-'+idx),
    le_sph:applyMinus(g('ee-le-sph-'+idx)),le_cyl:applyCyl(g('ee-le-cyl-'+idx)),le_ax:g('ee-le-ax-'+idx),
    add_power:addVal,pd:g('ee-pd-'+idx),
    phoria_far:g('ee-phoria-far-'+idx),phoria_near:g('ee-phoria-near-'+idx),
    vergence_far:g('ee-vergence-far-'+idx),vergence_near:g('ee-vergence-near-'+idx),
    accommodation_re:g('ee-acc-re-'+idx),accommodation_le:g('ee-acc-le-'+idx),accommodation_both:g('ee-acc-both-'+idx),
    facility_re:g('ee-fac-re-'+idx),facility_le:g('ee-fac-le-'+idx),facility_both:g('ee-fac-both-'+idx),
    npc:g('ee-npc-'+idx),comment:g('ee-comment-'+idx)
  };
  const {error}=await sb.from('exams').update(updates).eq('id',cu.exams[idx].id);
  if(error){alert('저장 실패: '+error.message);return;}
  Object.assign(cu.exams[idx],updates);
  cu.exams.sort((a,b)=>a.date.localeCompare(b.date));
  await updateVisitCount(cu);renderExamTab(cu);
}
async function deleteExam(idx){
  if(!confirm('이 검안기록을 삭제할까요?'))return;
  const cu=currentCustomer;
  const {error}=await sb.from('exams').delete().eq('id',cu.exams[idx].id);
  if(error){alert('삭제 실패: '+error.message);return;}
  cu.exams.splice(idx,1);await updateVisitCount(cu);renderExamTab(cu);
}

function getFrameItems(){
  const items=[];
  const wrap=document.getElementById('p-frame-items-wrap');if(!wrap)return items;
  // wrap의 직접 자식 중 p-frame-item-N ID를 가진 것만 처리
  [...wrap.children].forEach(el=>{
    if(!el.id||!el.id.startsWith('p-frame-item-'))return;
    const idx=el.id.replace('p-frame-item-','');
    const brand=document.getElementById('p-fi-brand-'+idx)?.value||'';
    const name=document.getElementById('p-fi-name-'+idx)?.value||'';
    const opt=document.getElementById('p-fi-option-'+idx)?.value||'';
    const custom=document.getElementById('p-fi-custom-'+idx)?.value||'';
    const price=parseInt(document.getElementById('p-fi-price-'+idx)?.value||0)||0;
    const itemName=brand?[brand,name,opt].filter(Boolean).join(' '):(custom||null);
    if(itemName||price) items.push({name:itemName,price});
  });
  return items;
}
function getLensItems(){
  const items=[];
  const wrap=document.getElementById('p-lens-items-wrap');if(!wrap)return items;
  [...wrap.children].forEach(el=>{
    if(!el.id||!el.id.startsWith('p-lens-item-'))return;
    const idx=el.id.replace('p-lens-item-','');
    const brand=document.getElementById('p-li-brand-'+idx)?.value||'';
    const name=document.getElementById('p-li-name-'+idx)?.value||'';
    const opt=document.getElementById('p-li-option-'+idx)?.value||'';
    const custom=document.getElementById('p-li-custom-'+idx)?.value||'';
    const price=parseInt(document.getElementById('p-li-price-'+idx)?.value||0)||0;
    const qty=parseFloat(document.getElementById('p-li-qty-'+idx)?.value||1)||1;
    const itemName=brand?[brand,name,opt].filter(Boolean).join(' '):(custom||null);
    if(itemName||price) items.push({name:itemName,price,qty});
  });
  return items;
}
function calcTotal(){
  const frameItems=getFrameItems();
  const lensItems=getLensItems();
  const fp=frameItems.reduce((s,i)=>s+i.price,0);
  const lp=lensItems.reduce((s,i)=>s+(i.price*(i.qty||1)),0);
  const sub=fp+lp;
  // 프레임 할인
  const dftype=document.getElementById('p-disc-frame-type')?.value||'percent';
  const dfv=parseInt(document.getElementById('p-disc-frame-value')?.value||0)||0;
  const dfextra=parseInt(document.getElementById('p-disc-frame-extra')?.value||0)||0;
  const frameDisc=(dfv>0?(dftype==='percent'?Math.round(fp*dfv/100):dfv):0)+dfextra;
  // 렌즈 할인
  const dltype=document.getElementById('p-disc-lens-type')?.value||'percent';
  const dlv=parseInt(document.getElementById('p-disc-lens-value')?.value||0)||0;
  const dlextra=parseInt(document.getElementById('p-disc-lens-extra')?.value||0)||0;
  const lensDisc=(dlv>0?(dltype==='percent'?Math.round(lp*dlv/100):dlv):0)+dlextra;
  const totalDisc=frameDisc+lensDisc;
  const final=Math.max(0,sub-totalDisc);
  const subEl=document.getElementById('p-subtotal');if(subEl)subEl.textContent='₩'+formatPrice(sub);
  const finEl=document.getElementById('p-final');if(finEl)finEl.textContent='₩'+formatPrice(final);
  const dfr=document.getElementById('p-disc-frame-row');if(dfr)dfr.style.display=frameDisc>0?'flex':'none';
  const dfd=document.getElementById('p-disc-frame-display');if(dfd)dfd.textContent='-₩'+formatPrice(frameDisc);
  const dlr=document.getElementById('p-disc-lens-row');if(dlr)dlr.style.display=lensDisc>0?'flex':'none';
  const dld=document.getElementById('p-disc-lens-display');if(dld)dld.textContent='-₩'+formatPrice(lensDisc);
}

async function savePurchase(){
  const cu=currentCustomer;
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim()||null:null;};
  const purchaseDate=g('p-date')||new Date().toISOString().split('T')[0];
  const frameItems=getFrameItems();
  const lensItems=getLensItems();
  const fp=frameItems.reduce((s,i)=>s+i.price,0);
  const lp=lensItems.reduce((s,i)=>s+(i.price*(i.qty||1)),0);
  const sub=fp+lp;
  const dftype=document.getElementById('p-disc-frame-type')?.value||'percent';
  const dfv=parseInt(g('p-disc-frame-value')||0)||0;
  const dfextra=parseInt(g('p-disc-frame-extra')||0)||0;
  const frameDisc=(dfv>0?(dftype==='percent'?Math.round(fp*dfv/100):dfv):0)+dfextra;
  const dltype=document.getElementById('p-disc-lens-type')?.value||'percent';
  const dlv=parseInt(g('p-disc-lens-value')||0)||0;
  const dlextra=parseInt(g('p-disc-lens-extra')||0)||0;
  const lensDisc=(dlv>0?(dltype==='percent'?Math.round(lp*dlv/100):dlv):0)+dlextra;
  const totalDisc=frameDisc+lensDisc;
  const finalPrice=Math.max(0,sub-totalDisc);
  const memo=g('p-memo');
  // 프레임: 첫번째 → frame_item, 두번째 → frame_item_b
  const frameItem=frameItems[0]?.name||null;
  const frame2Item=frameItems[1]?.name||null;
  const framePrice=frameItems[0]?.price||0;
  const frame2Price=frameItems[1]?.price||0;
  // 렌즈: 첫번째 → lens_item, 두번째 → lens_item_b
  const lensItem=lensItems[0]?.name||null;
  const lens2Item=lensItems[1]?.name||null;
  const lensPrice=lensItems[0]?.price||0;
  const lens2Price=lensItems[1]?.price||0;
  const lensQty=lensItems[0]?.qty||1;
  const lensQty2=lensItems[1]?.qty||1;
  // 원가 합산: 상품 DB에서 매칭되는 항목의 cost 합산
  function findCost(itemName){ if(!itemName)return 0; const p=products.find(p=>[p.brand,p.name,p.option].filter(Boolean).join(' ')===itemName); return p?.cost||0; }
  const costTotal=findCost(frameItem)+findCost(frame2Item)+(findCost(lensItem)*lensQty)+(findCost(lens2Item)*lensQty2);
  const newP={
    customer_id:cu.id,date:purchaseDate,
    item:[frameItem,frame2Item,lensItem,lens2Item].filter(Boolean).join(' / ')||'—',
    frame_item:frameItem,frame_item_b:frame2Item||null,
    lens_item:lensItem,lens_item_b:lens2Item||null,
    frame_price:framePrice,frame_price_b:frame2Price||null,
    lens_price:lensPrice,lens_price_b:lens2Price||null,
    lens_qty_a:lensQty,lens_qty_b:lensQty2,
    cost_total:Math.round(costTotal)||0,
    price:String(finalPrice),
    discount_frame_type:dfv?dftype:null,discount_frame_value:dfv||0,
    discount_frame_extra:dfextra||0,
    discount_lens_type:dlv?dltype:null,discount_lens_value:dlv||0,
    discount_lens_extra:dlextra||0,
    discount_value:totalDisc||0,
    final_price:finalPrice,payment_method:currentPayMethod,
    payment_card:currentPayMethod==='card'?finalPrice:currentPayMethod==='mixed'?(parseInt(g('p-pay-card-amt')||0)||0):0,
    payment_cash:currentPayMethod==='cash'?finalPrice:currentPayMethod==='mixed'?(parseInt(g('p-pay-cash-amt')||0)||0):0,
    lens:g('p-lens-rx'),
    memo:memo
  };
  const btn=document.querySelector('#purchase-form-area .action-btn.primary');
  if(btn){btn.disabled=true;btn.textContent='저장 중...';}
  const {data,error}=await sb.from('purchases').insert(newP).select().single();
  if(error){alert('저장 실패: '+error.message);if(btn){btn.disabled=false;btn.textContent='저장';}return;}
  cu.purchases.push(data);cu.purchases.sort((a,b)=>a.date.localeCompare(b.date));
  // 처방도수 입력 시 검안기록에도 자동 저장
  const pReSph=applyMinus(g('p-re-sph'));const pReCyl=applyCyl(g('p-re-cyl'));const pReAx=g('p-re-ax');
  const pLeSph=applyMinus(g('p-le-sph'));const pLeCyl=applyCyl(g('p-le-cyl'));const pLeAx=g('p-le-ax');
  const pAdd=applyPlus(g('p-add')||g('p-add2'));const pPd=g('p-pd')||g('p-pd2');
  if(pReSph||pLeSph||pReCyl||pLeCyl){
    const existing=cu.exams.find(e=>e.date===purchaseDate);
    const examData={customer_id:cu.id,date:purchaseDate,re_sph:pReSph,re_cyl:pReCyl,re_ax:pReAx,le_sph:pLeSph,le_cyl:pLeCyl,le_ax:pLeAx,add_power:pAdd,pd:pPd};
    if(existing){
      await sb.from('exams').update(examData).eq('id',existing.id);
      Object.assign(existing,examData);
    }else{
      const {data:newExam}=await sb.from('exams').insert(examData).select().single();
      if(newExam){cu.exams.push(newExam);cu.exams.sort((a,b)=>a.date.localeCompare(b.date));}
    }
  }
  await updateVisitCount(cu);renderPurchaseTab(cu);
}

function setPePayMethod(idx,m){
  const c=document.getElementById('pe-pay-'+idx);if(!c)return;
  const methods=['card','cash','mixed'];
  c.querySelectorAll('.pay-btn').forEach((b,i)=>b.classList.toggle('active',methods[i]===m));
  const wrap=document.getElementById('pe-mixed-wrap-'+idx);
  if(wrap)wrap.style.display=m==='mixed'?'block':'none';
}
function getPePayMethod(idx){
  const c=document.getElementById('pe-pay-'+idx);if(!c)return'card';
  const methods=['card','cash','mixed'];
  const btns=[...c.querySelectorAll('.pay-btn')];
  const ai=btns.findIndex(b=>b.classList.contains('active'));
  return methods[ai]||'card';
}
function calcEditTotal(idx){
  const fp=parseInt(document.getElementById('pe-fp-'+idx)?.value||0)||0;
  const lp=parseInt(document.getElementById('pe-lp-'+idx)?.value||0)||0;
  const sub=fp+lp;
  const dft=document.getElementById('pe-dft-'+idx)?.value||'percent';
  const dfv=parseInt(document.getElementById('pe-dfv-'+idx)?.value||0)||0;
  const dfex=parseInt(document.getElementById('pe-dfex-'+idx)?.value||0)||0;
  const frameDisc=(dfv>0?(dft==='percent'?Math.round(fp*dfv/100):dfv):0)+dfex;
  const dlt=document.getElementById('pe-dlt-'+idx)?.value||'percent';
  const dlv=parseInt(document.getElementById('pe-dlv-'+idx)?.value||0)||0;
  const dlex=parseInt(document.getElementById('pe-dlex-'+idx)?.value||0)||0;
  const lensDisc=(dlv>0?(dlt==='percent'?Math.round(lp*dlv/100):dlv):0)+dlex;
  const totalDisc=frameDisc+lensDisc;
  const final=Math.max(0,sub-totalDisc);
  const se=document.getElementById('pe-sub-'+idx);if(se)se.textContent='₩'+formatPrice(sub);
  const de=document.getElementById('pe-disc-'+idx);if(de)de.textContent=totalDisc>0?'-₩'+formatPrice(totalDisc):'—';
  const fe=document.getElementById('pe-fin-'+idx);if(fe)fe.textContent='₩'+formatPrice(final);
}
async function savePurchaseEdit(idx){
  const cu=currentCustomer;
  const g=id=>{const v=document.getElementById(id);return v?v.value||null:null;};
  const fp=parseInt(g('pe-fp-'+idx)||0)||0;
  const lp=parseInt(g('pe-lp-'+idx)||0)||0;
  const sub=fp+lp;
  const dft=document.getElementById('pe-dft-'+idx)?.value||'percent';
  const dfv=parseInt(g('pe-dfv-'+idx)||0)||0;
  const dfex=parseInt(g('pe-dfex-'+idx)||0)||0;
  const frameDisc=(dfv>0?(dft==='percent'?Math.round(fp*dfv/100):dfv):0)+dfex;
  const dlt=document.getElementById('pe-dlt-'+idx)?.value||'percent';
  const dlv=parseInt(g('pe-dlv-'+idx)||0)||0;
  const dlex=parseInt(g('pe-dlex-'+idx)||0)||0;
  const lensDisc=(dlv>0?(dlt==='percent'?Math.round(lp*dlv/100):dlv):0)+dlex;
  const totalDisc=frameDisc+lensDisc;
  const final=Math.max(0,sub-totalDisc);
  const fi=g('pe-frame-item-'+idx);const li=g('pe-lens-item-'+idx);
  const updates={
    date:g('pe-date-'+idx),frame_item:fi,lens_item:li,
    item:[fi,li].filter(Boolean).join(' / ')||'—',
    frame_price:fp,lens_price:lp,memo:g('pe-memo-'+idx),
    discount_frame_type:dfv?dft:null,discount_frame_value:dfv||0,
    discount_frame_extra:dfex||0,
    discount_lens_type:dlv?dlt:null,discount_lens_value:dlv||0,
    discount_lens_extra:dlex||0,
    discount_value:totalDisc||0,
    final_price:final,price:String(final),
    payment_method:getPePayMethod(idx),
    payment_card:getPePayMethod(idx)==='card'?final:getPePayMethod(idx)==='mixed'?(parseInt(g('pe-card-amt-'+idx)||0)||0):0,
    payment_cash:getPePayMethod(idx)==='cash'?final:getPePayMethod(idx)==='mixed'?(parseInt(g('pe-cash-amt-'+idx)||0)||0):0,
    lens:g('pe-lens-'+idx)
  };
  const {error}=await sb.from('purchases').update(updates).eq('id',cu.purchases[idx].id);
  if(error){alert('저장 실패: '+error.message);return;}
  Object.assign(cu.purchases[idx],updates);
  // 처방도수 입력 시 검안기록에도 저장
  const reSph=applyMinus(g('pe-re-sph-'+idx));const reCyl=applyCyl(g('pe-re-cyl-'+idx));const reAx=g('pe-re-ax-'+idx);
  const leSph=applyMinus(g('pe-le-sph-'+idx));const leCyl=applyCyl(g('pe-le-cyl-'+idx));const leAx=g('pe-le-ax-'+idx);
  const addPow=applyPlus(g('pe-add-'+idx)||g('pe-add2-'+idx));const pd=g('pe-pd-'+idx)||g('pe-pd2-'+idx);
  if(reSph||leSph||reCyl||leCyl){
    const examDate=updates.date;
    const existing=cu.exams.find(e=>e.date===examDate);
    const examData={customer_id:cu.id,date:examDate,re_sph:reSph,re_cyl:reCyl,re_ax:reAx,le_sph:leSph,le_cyl:leCyl,le_ax:leAx,add_power:addPow,pd};
    if(existing){
      await sb.from('exams').update(examData).eq('id',existing.id);
      Object.assign(existing,examData);
    }else{
      const {data:newExam}=await sb.from('exams').insert(examData).select().single();
      if(newExam)cu.exams.push(newExam);
    }
    cu.exams.sort((a,b)=>a.date.localeCompare(b.date));
  }
  cu.purchases.sort((a,b)=>a.date.localeCompare(b.date));
  await updateVisitCount(cu);renderPurchaseTab(cu);
}
async function deletePurchase(idx){
  if(!confirm('이 구매내역을 삭제할까요?'))return;
  const cu=currentCustomer;
  const {error}=await sb.from('purchases').delete().eq('id',cu.purchases[idx].id);
  if(error){alert('삭제 실패: '+error.message);return;}
  cu.purchases.splice(idx,1);await updateVisitCount(cu);renderPurchaseTab(cu);
}

// 방문횟수 (날짜 중복 제거)
async function updateVisitCount(cu){
  const allDates=new Set([...cu.exams.map(e=>e.date),...cu.purchases.map(p=>p.date)].filter(Boolean));
  const visitCount=allDates.size;
  const sortedDates=[...allDates].sort();
  const lastVisit=sortedDates.length?sortedDates[sortedDates.length-1]:null;
  await sb.from('customers').update({visits:visitCount,last_visit:lastVisit}).eq('id',cu.id);
  cu.visits=visitCount;cu.last_visit=lastVisit;
  const cidx=customers.findIndex(c=>c.id===cu.id);
  if(cidx>=0){customers[cidx].visits=visitCount;customers[cidx].last_visit=lastVisit;}
}

function copyMsg(){

  // 브랜드별로 그룹핑해서 접기/펼치기 UI
  function buildGroupHtml(list, cat){
    const brands=[...new Set(list.map(p=>p.brand))];
    return brands.map(brand=>{
      const items=list.filter(p=>p.brand===brand);
      const gid='pg-'+cat+'-'+brand.replace(/[^a-z0-9]/gi,'_');
      return `
        <div style="border:0.5px solid #EBEBEB;border-radius:8px;margin-bottom:6px;overflow:hidden;">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#F9F9F9;cursor:pointer;" onclick="toggleProductGroup('${gid}')">
            <span style="font-size:13px;font-weight:500;color:var(--text-primary);">${brand}</span>
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:11px;color:var(--text-hint);">${items.length}개</span>
              <svg id="${gid}-arrow" width="12" height="12" viewBox="0 0 12 12" fill="none" style="transition:transform 0.2s;transform:rotate(0deg);"><path d="M2 4l4 4 4-4" stroke="#9b9b9b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>
          <div id="${gid}" style="display:none;">
            ${items.map(p=>`
            <div class="admin-row" style="padding:8px 12px;" id="prod-row-${p.id}">
              <div style="flex:1;min-width:0;">
                <div style="font-size:13px;font-weight:500;color:var(--text-primary);">${p.name}${p.option?' <span style="color:var(--text-hint);font-weight:400;">/ '+p.option+'</span>':''}</div>
                <div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">
                  ${p.price?'판매가 ₩'+formatPrice(p.price):'금액 미설정'}
                  ${p.cost?` · 원가 ₩${formatPrice(p.cost)} · 마진율 ${p.price?Math.round((p.price-p.cost)/p.price*100)+'%':'—'}`:''}
                </div>
              </div>
              <div style="display:flex;gap:6px;flex-shrink:0;">
                <button class="edit-btn" onclick="showEditProductForm('${p.id}')">수정</button>
                <button class="edit-btn" style="color:#FF2400;border-color:#FF2400;" onclick="deleteProduct('${p.id}')">삭제</button>
              </div>
            </div>
            <div id="prod-edit-${p.id}" style="display:none;padding:12px;background:#FFF8F8;border-top:0.5px solid #EBEBEB;"></div>
            `).join('')}
          </div>
        </div>`;
    }).join('');
  }

  let html='';
  if(frames.length){
    html+=`<div style="font-size:11px;font-weight:600;color:var(--text-hint);letter-spacing:0.06em;margin-bottom:8px;">프레임 (${frames.length}개)</div>`;
    html+=buildGroupHtml(frames,'frame');
  }
  if(lenses.length){
    html+=`<div style="font-size:11px;font-weight:600;color:var(--text-hint);letter-spacing:0.06em;margin:${frames.length?'14px':0} 0 8px;">렌즈 (${lenses.length}개)</div>`;
    html+=buildGroupHtml(lenses,'lens');
  }
  if(etcs.length){
    html+=`<div style="font-size:11px;font-weight:600;color:var(--text-hint);letter-spacing:0.06em;margin:${(frames.length||lenses.length)?'14px':0} 0 8px;">기타 (${etcs.length}개)</div>`;
    html+=buildGroupHtml(etcs,'etc');
  }
  el.innerHTML=html;
}

async function saveProductEdit(id){
  const brand=document.getElementById('pe-brand-'+id)?.value.trim();
  const name=document.getElementById('pe-name-'+id)?.value.trim();
  const option=document.getElementById('pe-option-'+id)?.value.trim()||null;
  const price=parseInt(document.getElementById('pe-price-'+id)?.value||0)||0;
  const msg=document.getElementById('pe-msg-'+id);
  if(!brand||!name){if(msg)msg.textContent='브랜드와 상품명을 입력해주세요.';return;}

  // 수정 전 상품명 조회 (구매내역 업데이트용)
  const oldProduct=products.find(p=>p.id===id);
  const oldItemName=oldProduct?[oldProduct.brand,oldProduct.name,oldProduct.option].filter(Boolean).join(' '):null;
  const newItemName=[brand,name,option].filter(Boolean).join(' ');

  const cost=parseInt(document.getElementById('pe-cost-'+id)?.value||0)||0;
  const {error}=await sb.from('products').update({brand,name,option,price,cost}).eq('id',id);
  if(error){if(msg)msg.textContent='오류: '+error.message;return;}

  // 상품명이 바뀐 경우 구매내역 업데이트 여부 확인
  if(oldItemName&&oldItemName!==newItemName){
    if(confirm(`상품명이 "${oldItemName}" → "${newItemName}"으로 변경됩니다.
기존 구매내역에 등록된 "${oldItemName}"도 "${newItemName}"으로 업데이트할까요?`)){
      if(msg){msg.style.color='#6b6b6b';msg.textContent='구매내역 업데이트 중...';}
      await updatePurchaseItemName(oldItemName, newItemName);
      if(msg){msg.style.color='#2d5a1b';msg.textContent='✓ 저장 및 구매내역 업데이트 완료!';}
    }else{
      if(msg){msg.style.color='#2d5a1b';msg.textContent='✓ 저장 완료 (기존 구매내역 유지)';}
    }
  }else{
    if(msg){msg.style.color='#2d5a1b';msg.textContent='✓ 저장 완료';}
  }
  products=[];loadProductList();
}

async function updatePurchaseItemName(oldName, newName){
  // frame_item, frame_item_b, lens_item, lens_item_b 각각 업데이트
  const fields=['frame_item','frame_item_b','lens_item','lens_item_b'];
  for(const field of fields){
    // 완전 일치하는 경우
    await sb.from('purchases').update({[field]:newName}).eq(field, oldName);
    // "A / B" 형태로 포함된 경우 (구버전 데이터)
    const {data}=await sb.from('purchases').select('id,'+field).like(field, '%'+oldName+'%');
    if(data&&data.length){
      for(const row of data){
        const updated=(row[field]||'').split(' / ').map(s=>s.trim()===oldName?newName:s).join(' / ');
        await sb.from('purchases').update({[field]:updated}).eq('id',row.id);
      }
    }
  }
  // item 컬럼도 업데이트
  const {data:itemRows}=await sb.from('purchases').select('id,item').like('item','%'+oldName+'%');
  if(itemRows&&itemRows.length){
    for(const row of itemRows){
      const updated=(row.item||'').split(' / ').map(s=>s.trim()===oldName?newName:s).join(' / ');
      await sb.from('purchases').update({item:updated}).eq('id',row.id);
    }
  }
}

async function importProducts(event){
  const file=event.target.files[0];if(!file)return;
  const msgEl=document.getElementById('product-import-msg');
  if(msgEl){msgEl.style.color='#6b6b6b';msgEl.textContent='파일 읽는 중...';}
  const reader=new FileReader();
  reader.onload=async(e)=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const ws=wb.Sheets['상품목록'];
      if(!ws){
        if(msgEl){msgEl.style.color='#FF2400';msgEl.textContent='오류: "상품목록" 시트를 찾을 수 없습니다.';}
        return;
      }
      const rows=XLSX.utils.sheet_to_json(ws);
      if(!rows.length){
        if(msgEl){msgEl.style.color='#FF2400';msgEl.textContent='오류: 데이터가 없습니다.';}
        return;
      }
      // 유효성 검사
      const valid=rows.filter(r=>{
        const cat=String(r.category||'').trim().toLowerCase();
        return (cat==='frame'||cat==='lens'||cat==='etc')&&String(r.name||'').trim();
      });
      const invalid=rows.length-valid.length;
      if(!valid.length){
        if(msgEl){msgEl.style.color='#FF2400';msgEl.textContent='오류: 유효한 상품이 없습니다. category는 frame/lens/etc 중 하나여야 합니다.';}
        return;
      }
      const confirmMsg=`${valid.length}개 상품을 등록/업데이트할까요?${invalid>0?' ('+invalid+'개 오류 행은 건너뜁니다.)':''}`;
      if(!confirm(confirmMsg))return;
      if(msgEl){msgEl.style.color='#6b6b6b';msgEl.textContent='처리 중...';}

      // id가 있으면 업데이트, 없으면 브랜드+상품명+옵션으로 기존 상품 찾아서 업데이트, 없으면 신규 추가
      await loadProducts();
      let updated=0, inserted=0, failed=0;
      for(const r of valid){
        const cat=String(r.category).trim().toLowerCase();
        const brand=String(r.brand||'').trim()||null;
        const name=String(r.name).trim();
        const option=String(r.option||'').trim()||null;
        const price=parseInt(r.price)||0;
        const cost=parseInt(r.cost)||0;
        const rowId=r.id?String(r.id).trim():null;

        if(rowId){
          // id로 업데이트
          const {error}=await sb.from('products').update({category:cat,brand,name,option,price,cost}).eq('id',rowId);
          if(error) failed++; else updated++;
        } else {
          // 브랜드+상품명+옵션으로 기존 상품 찾기
          const existing=products.find(p=>p.category===cat&&p.brand===brand&&p.name===name&&(p.option||null)===(option||null));
          if(existing){
            const {error}=await sb.from('products').update({price,cost}).eq('id',existing.id);
            if(error) failed++; else updated++;
          } else {
            const {error}=await sb.from('products').insert({category:cat,brand,name,option,price,cost});
            if(error) failed++; else inserted++;
          }
        }
      }
      products=[];
      const msg=`✓ 신규 ${inserted}개 추가, ${updated}개 업데이트${failed>0?' (실패 '+failed+'개)':''}`;
      if(msgEl){msgEl.style.color=failed>0?'#FF2400':'#2d5a1b';msgEl.textContent=msg;}
      loadProductList();
      event.target.value='';
    }catch(err){
      if(msgEl){msgEl.style.color='#FF2400';msgEl.textContent='파일 읽기 실패: '+err.message;}
    }
  };
  reader.readAsBinaryString(file);
}

// 알림
function calcAlarms(customerList){
  const today=new Date();today.setHours(0,0,0,0);
  const alarms=[];
  customerList.forEach(cu=>{
    if(!cu.last_visit)return;
    const base=new Date(cu.last_visit);base.setHours(0,0,0,0);
    const diff=Math.round((today-base)/(1000*60*60*24));
    const key=type=>`${cu.id}_${type}_${cu.last_visit}`;
    if(diff>=5&&diff<=9&&!alarmDoneSet.has(key('week'))) alarms.push({cu,type:'week',label:'1주일',diff,key:key('week')});
    if(diff>=27&&diff<=33&&!alarmDoneSet.has(key('month'))) alarms.push({cu,type:'month',label:'1개월',diff,key:key('month')});
    if(diff>=358&&diff<=372&&!alarmDoneSet.has(key('year'))) alarms.push({cu,type:'year',label:'1년',diff,key:key('year')});
  });
  alarms.sort((a,b)=>b.diff-a.diff);return alarms;
}

// 유틸
function parsePrice(str){
  if(!str||str==='—')return 0;
  return parseInt(String(str).replace(/[^0-9]/g,''))||0;
}
function formatPrice(n){return Number(n).toLocaleString('ko-KR');}
function formatChartTick(v){
  if(v===0)return'0';
  if(v>=100000000)return(v/100000000).toFixed(1)+'억';
  if(v>=10000000)return(v/10000000).toFixed(1)+'천만';
  if(v>=1000000)return(v/1000000).toFixed(1)+'백만';
  if(v>=10000)return(v/10000).toFixed(0)+'만';
  return String(v);
}

function calcPaySummary(list){
  let card=0,cash=0,mixed=0;
  list.forEach(p=>{
    const amt=parsePrice(p.final_price||p.price);
    if(p.payment_method==='cash') cash+=amt;
    else if(p.payment_method==='mixed'){
      card+=parsePrice(p.payment_card||0);
      cash+=parsePrice(p.payment_cash||0);
      mixed+=amt;
    } else card+=amt;
  });
  return {card,cash,mixed};
}
function payBadge(card,cash){
  return `<div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;">
    <span style="font-size:11px;background:#EEF2FF;color:#3730a3;padding:2px 8px;border-radius:99px;">카드 ₩${formatPrice(card)}</span>
    <span style="font-size:11px;background:#F0F9F0;color:#2d5a1b;padding:2px 8px;border-radius:99px;">현금 ₩${formatPrice(cash)}</span>
  </div>`;
}
function renderMonthly(purchases){
  const map={},cardMap={},cashMap={};
  purchases.forEach(p=>{
    if(!p.date)return;
    const k=p.date.slice(0,7);
    map[k]=(map[k]||0)+parsePrice(p.final_price||p.price);
    if(p.payment_method==='cash') cashMap[k]=(cashMap[k]||0)+parsePrice(p.final_price||p.price);
    else if(p.payment_method==='mixed'){cardMap[k]=(cardMap[k]||0)+parsePrice(p.payment_card||0);cashMap[k]=(cashMap[k]||0)+parsePrice(p.payment_cash||0);}
    else cardMap[k]=(cardMap[k]||0)+parsePrice(p.final_price||p.price);
  });
  const months=Object.keys(map).sort().reverse();
  const thisMonth=new Date().toISOString().slice(0,7);
  const thisPay=calcPaySummary(purchases.filter(p=>(p.date||'').startsWith(thisMonth)));
  return `<div class="stats-summary"><div class="stats-label">이번 달 매출</div><div class="stats-amount">₩${formatPrice(map[thisMonth]||0)}</div>${payBadge(thisPay.card,thisPay.cash)}</div>
  <div style="background:#fff;border:0.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;"><canvas id="statsChart" height="180"></canvas></div>
  <div class="card">${months.length?months.map(m=>`<div class="stats-row" style="flex-direction:column;align-items:flex-start;gap:4px;"><div style="display:flex;justify-content:space-between;width:100%;"><span style="font-size:13px;color:var(--text-secondary);">${m}</span><span style="font-size:13px;font-weight:500;">₩${formatPrice(map[m])}</span></div><div style="display:flex;gap:6px;"><span style="font-size:11px;color:#3730a3;">카드 ₩${formatPrice(cardMap[m]||0)}</span><span style="font-size:11px;color:#2d5a1b;">현금 ₩${formatPrice(cashMap[m]||0)}</span></div></div>`).join(''):'<div style="font-size:13px;color:var(--text-hint);padding:8px 0;text-align:center;">구매 내역이 없습니다.</div>'}</div>`;
}

function renderWeekly(purchases){
  const now=new Date();

  purchases.forEach(p=>{
    if(!p.date)return;
    const d=new Date(p.date);
    const diff=Math.floor((now-d)/(7*24*60*60*1000));
    if(diff<0||diff>=8)return;
    if(!weekMap[diff])weekMap[diff]={label:diff===0?'이번 주':diff===1?'지난 주':diff+'주 전',total:0};
    weekMap[diff].total+=parsePrice(p.final_price||p.price);
  });
  const thisWeekTotal=weekMap[0]?.total||0;
  const rows=Array.from({length:8},(_,i)=>i).filter(i=>weekMap[i])
    .map(i=>`<div class="stats-row"><span style="font-size:13px;color:var(--text-secondary);">${weekMap[i].label}</span><span style="font-size:13px;font-weight:500;">₩${formatPrice(weekMap[i].total)}</span></div>`).join('');
  return `<div class="stats-summary"><div class="stats-label">이번 주 매출</div><div class="stats-amount">₩${formatPrice(thisWeekTotal)}</div></div>
  <div style="background:#fff;border:0.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;"><canvas id="statsChart" height="180"></canvas></div>

}

function renderYearly(purchases){

// 기간별 판매내역
let _periodFrom='', _periodTo='';
function renderPeriod(purchases){
  const now=new Date();
  const todayStr=now.toISOString().split('T')[0];
  // 기본값: 이번 주 월요일 ~ 오늘
  if(!_periodFrom){
    const day=now.getDay()||7;
    const mon=new Date(now);mon.setDate(now.getDate()-day+1);
    _periodFrom=mon.toISOString().split('T')[0];
    _periodTo=todayStr;
  }
  const from=_periodFrom, to=_periodTo;
  const filtered=purchases.filter(p=>p.date&&p.date>=from&&p.date<=to);
  const totalAmt=filtered.reduce((s,p)=>s+parsePrice(p.final_price||p.price),0);

  // 상품별 집계
  const frameMap={},lensMap={};
  filtered.forEach(p=>{
    if(p.frame_item){frameMap[p.frame_item]=frameMap[p.frame_item]||{count:0};frameMap[p.frame_item].count+=1;}
    if(p.frame_item_b){frameMap[p.frame_item_b]=frameMap[p.frame_item_b]||{count:0};frameMap[p.frame_item_b].count+=1;}
    if(p.lens_item){const q=parseFloat(p.lens_qty_a||1);lensMap[p.lens_item]=lensMap[p.lens_item]||{count:0};lensMap[p.lens_item].count+=q;}
    if(p.lens_item_b){const q=parseFloat(p.lens_qty_b||1);lensMap[p.lens_item_b]=lensMap[p.lens_item_b]||{count:0};lensMap[p.lens_item_b].count+=q;}
  });
  const frames=Object.entries(frameMap).sort((a,b)=>b[1].count-a[1].count);
  const lenses=Object.entries(lensMap).sort((a,b)=>b[1].count-a[1].count);

  const quickBtns=[
    {label:'오늘',from:todayStr,to:todayStr},
    {label:'이번 주',from:(()=>{const d=new Date();const day=d.getDay()||7;d.setDate(d.getDate()-day+1);return d.toISOString().split('T')[0];})(),to:todayStr},
    {label:'이번 달',from:todayStr.slice(0,7)+'-01',to:todayStr},
    {label:'지난 달',from:(()=>{const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-1);return d.toISOString().split('T')[0];})(),to:(()=>{const d=new Date();d.setDate(0);return d.toISOString().split('T')[0];})()},
  ];

  const pay=calcPaySummary(filtered);
  return `
  <div class="card" style="margin-bottom:12px;">
    <div style="font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:10px;">조회 기간</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
      ${quickBtns.map(b=>`<button onclick="setPeriod('${b.from}','${b.to}')" style="flex-shrink:0;border:0.5px solid var(--border)!important;background:#fff!important;border-radius:20px!important;padding:6px 13px!important;font-size:12px!important;color:var(--text-secondary)!important;cursor:pointer!important;-webkit-appearance:none!important;">${b.label}</button>`).join('')}
    </div>
    <div class="form-grid" style="gap:8px;">
      <div><div class="form-label">시작일</div>
        <input class="form-input" type="date" id="period-from" value="${from}" onchange="applyPeriod()"></div>
      <div><div class="form-label">종료일</div>
        <input class="form-input" type="date" id="period-to" value="${to}" onchange="applyPeriod()"></div>
    </div>
  </div>
  <div class="stats-summary">
    <div class="stats-label">${from} ~ ${to}</div>
    <div class="stats-amount">₩${formatPrice(totalAmt)}</div>
    <div class="stats-label" style="margin-top:4px;">${filtered.length}건 판매</div>
    ${payBadge(pay.card,pay.cash)}
  </div>
  ${frames.length?`
  <div class="section-label" style="margin-top:14px;">프레임 판매</div>
  <div class="card">
    ${frames.map(([name,v])=>`<div class="stats-row">
      <div style="flex:1;font-size:13px;font-weight:500;">${name}</div>
      <div style="font-size:13px;font-weight:600;">${v.count}개</div>
    </div>`).join('')}
  </div>`:''}
  ${lenses.length?`
  <div class="section-label">렌즈 판매</div>
  <div class="card">
    ${lenses.map(([name,v])=>`<div class="stats-row">
      <div style="flex:1;font-size:13px;font-weight:500;">${name}</div>
      <div style="font-size:13px;font-weight:600;">${v.count%1===0?v.count:v.count.toFixed(1)}조</div>
    </div>`).join('')}
  </div>`:''}
  ${!frames.length&&!lenses.length?`<div style="text-align:center;padding:40px 0;color:var(--text-hint);font-size:14px;">해당 기간에 판매 내역이 없습니다.</div>`:''}`;
}
function setPeriod(from,to){
  _periodFrom=from;_periodTo=to;
  renderStatsPage(_statsData.purchases,_statsData.cuMap);
}
function applyPeriod(){
  _periodFrom=document.getElementById('period-from')?.value||_periodFrom;
  _periodTo=document.getElementById('period-to')?.value||_periodTo;
  renderStatsPage(_statsData.purchases,_statsData.cuMap);
}

function renderRanking(purchases,cuMap){
  const cuTotal={};
  purchases.forEach(p=>{if(!p.customer_id)return;cuTotal[p.customer_id]=(cuTotal[p.customer_id]||0)+parsePrice(p.final_price||p.price);});
  const ranked=Object.keys(cuTotal).map(id=>({id,total:cuTotal[id],cu:cuMap[id]||null})).sort((a,b)=>b.total-a.total);
  const grandTotal=ranked.reduce((s,r)=>s+r.total,0);
  const rows=ranked.map((r,i)=>{
    const name=r.cu?r.cu.name:'(알 수 없음)';
    const rankLabel=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'위';
    return `<div class="stats-row" onclick="${r.cu?`openDetailFromStats('${r.id}')`:''}" style="cursor:${r.cu?'pointer':'default'};">
      <span class="rank-num ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${rankLabel}</span>
      <div style="flex:1;min-width:0;margin-left:10px;">
        <div style="font-size:14px;font-weight:500;">${name}</div>
        <div style="font-size:11px;color:var(--text-hint);">구매 ${purchases.filter(p=>p.customer_id===r.id).length}건</div>
      </div>
      <span style="font-size:14px;font-weight:600;">₩${formatPrice(r.total)}</span>
    </div>`;
  }).join('');
  return `<div class="stats-summary"><div class="stats-label">전체 누적 매출</div><div class="stats-amount">₩${formatPrice(grandTotal)}</div><div class="stats-label" style="margin-top:4px;">총 ${ranked.length}명 고객</div></div>
  <div class="card">${rows||'<div style="font-size:13px;color:var(--text-hint);padding:8px 0;text-align:center;">구매 내역이 없습니다.</div>'}</div>`;
}

// 원가/마진 탭 서브필터
let _marginSub='monthly';
function setMarginSub(s){
  _marginSub=s;
  renderStatsPage(_statsData.purchases,_statsData.cuMap);
}

function renderMargin(purchases){
  // 서브탭
  const subTabs=['monthly','daily','yearly','period'].map(k=>({k,label:{monthly:'월별',daily:'일별',yearly:'연도별',period:'기간별'}[k]}));
  const subBar=`<div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;">
    ${subTabs.map(t=>`<button onclick="setMarginSub('${t.k}')" style="flex-shrink:0;border:0.5px solid ${_marginSub===t.k?'#1a1a1a':'var(--border)'}!important;background:${_marginSub===t.k?'#1a1a1a':'#fff'}!important;border-radius:20px!important;padding:7px 13px!important;font-size:12px!important;color:${_marginSub===t.k?'#fff':'var(--text-secondary)'}!important;cursor:pointer!important;-webkit-appearance:none!important;">${t.label}</button>`).join('')}
  </div>`;

  // 기간 필터 적용
  let filtered=purchases, groupKey, groupLabel;
  const now=new Date();
  if(_marginSub==='monthly'){
    const prefix=now.toISOString().slice(0,7);
    // 최근 12개월
    groupKey=p=>p.date?.slice(0,7);
    groupLabel=k=>k;
    filtered=purchases.filter(p=>p.date);
  } else if(_marginSub==='daily'){
    const prefix=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
    filtered=purchases.filter(p=>(p.date||'').startsWith(prefix));
    groupKey=p=>p.date?.slice(0,10);
    groupLabel=k=>k;
  } else if(_marginSub==='yearly'){
    filtered=purchases.filter(p=>p.date);
    groupKey=p=>p.date?.slice(0,4);
    groupLabel=k=>k+'년';
  } else {
    // period
    filtered=purchases.filter(p=>p.date&&p.date>=_periodFrom&&p.date<=_periodTo);
    groupKey=p=>p.date?.slice(0,10);
    groupLabel=k=>k;
  }

  // 그룹별 집계
  const groups={};
  filtered.forEach(p=>{
    const k=groupKey(p);if(!k)return;
    if(!groups[k])groups[k]={sales:0,cost:0,cnt:0,noCost:0};
    const sales=parsePrice(p.final_price||p.price);
    const cost=parsePrice(p.cost_total||0);
    groups[k].sales+=sales;
    groups[k].cost+=cost;
    groups[k].cnt+=1;
    if(!p.cost_total) groups[k].noCost+=1;
  });

  const keys=Object.keys(groups).sort().reverse().slice(0,24);
  const totalSales=filtered.reduce((s,p)=>s+parsePrice(p.final_price||p.price),0);
  const totalCost=filtered.reduce((s,p)=>s+parsePrice(p.cost_total||0),0);
  const totalMargin=totalSales-totalCost;
  const totalMarginRate=totalSales>0?Math.round(totalMargin/totalSales*100):0;
  const noCostCnt=filtered.filter(p=>!p.cost_total).length;

  function marginColor(rate){ return rate>=50?'#2d5a1b':rate>=30?'#7a4800':'#c41c00'; }

  const periodTitle=_marginSub==='period'?`${_periodFrom} ~ ${_periodTo}`:
    _marginSub==='daily'?`${now.getFullYear()}년 ${now.getMonth()+1}월`:
    _marginSub==='yearly'?'전체 연도별':'최근 24개월';

  return subBar+`
  <div class="stats-summary" style="margin-bottom:12px;">
    <div class="stats-label">${periodTitle}</div>
    <div class="stats-amount">₩${formatPrice(totalSales)}</div>
    <div style="display:flex;justify-content:center;gap:16px;margin-top:8px;flex-wrap:wrap;">
      <div style="text-align:center;">
        <div style="font-size:11px;color:var(--text-hint);">원가</div>
        <div style="font-size:15px;font-weight:600;color:#c41c00;">₩${formatPrice(totalCost)}</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:11px;color:var(--text-hint);">마진</div>
        <div style="font-size:15px;font-weight:600;color:#2d5a1b;">₩${formatPrice(totalMargin)}</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:11px;color:var(--text-hint);">마진율</div>
        <div style="font-size:15px;font-weight:600;color:${marginColor(totalMarginRate)};">${totalMarginRate}%</div>
      </div>
    </div>
    ${noCostCnt>0?`<div style="font-size:11px;color:var(--text-hint);margin-top:6px;">⚠ 원가 미등록 ${noCostCnt}건 포함 (해당 건 원가=0 처리)</div>`:''}
  </div>
  <div class="card">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0;margin-bottom:4px;padding-bottom:8px;border-bottom:0.5px solid #EBEBEB;">
      <div style="font-size:11px;font-weight:600;color:var(--text-hint);">기간</div>
      <div style="font-size:11px;font-weight:600;color:var(--text-hint);text-align:right;">매출</div>
      <div style="font-size:11px;font-weight:600;color:var(--text-hint);text-align:right;">마진</div>
      <div style="font-size:11px;font-weight:600;color:var(--text-hint);text-align:right;">마진율</div>
    </div>
    ${keys.length?keys.map(k=>{
      const g=groups[k];
      const margin=g.sales-g.cost;
      const rate=g.sales>0?Math.round(margin/g.sales*100):0;
      return `<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0;padding:9px 0;border-bottom:0.5px solid #EBEBEB;">
        <div style="font-size:12px;color:var(--text-secondary);">${groupLabel(k)}</div>
        <div style="font-size:12px;font-weight:500;text-align:right;">₩${formatPrice(g.sales)}</div>
        <div style="font-size:12px;font-weight:500;text-align:right;color:#2d5a1b;">₩${formatPrice(margin)}</div>
        <div style="font-size:12px;font-weight:600;text-align:right;color:${marginColor(rate)};">${rate}%</div>
      </div>`;
    }).join(''):'<div style="font-size:13px;color:var(--text-hint);padding:8px 0;text-align:center;">데이터가 없습니다.</div>'}
  </div>`;
}

function renderProductStats(purchases){
  const frameMap={},lensMap={};
  purchases.forEach(p=>{
    // 프레임 A
    if(p.frame_item){frameMap[p.frame_item]=frameMap[p.frame_item]||{count:0,revenue:0};frameMap[p.frame_item].count+=1;frameMap[p.frame_item].revenue+=parsePrice(p.frame_price||0);}
    // 프레임 B (별도 집계)
    if(p.frame_item_b){frameMap[p.frame_item_b]=frameMap[p.frame_item_b]||{count:0,revenue:0};frameMap[p.frame_item_b].count+=1;frameMap[p.frame_item_b].revenue+=parsePrice(p.frame_price_b||0);}
    // 렌즈 A
    if(p.lens_item){const qty=parseFloat(p.lens_qty_a||p.lens_qty||1);lensMap[p.lens_item]=lensMap[p.lens_item]||{count:0,revenue:0};lensMap[p.lens_item].count+=qty;lensMap[p.lens_item].revenue+=parsePrice(p.lens_price||0)*qty;}
    // 렌즈 B (별도 집계)
    if(p.lens_item_b){const qty2=parseFloat(p.lens_qty_b||1);lensMap[p.lens_item_b]=lensMap[p.lens_item_b]||{count:0,revenue:0};lensMap[p.lens_item_b].count+=qty2;lensMap[p.lens_item_b].revenue+=parsePrice(p.lens_price_b||0)*qty2;}
  });
  const frames=Object.entries(frameMap).sort((a,b)=>b[1].count-a[1].count);
  const lenses=Object.entries(lensMap).sort((a,b)=>b[1].count-a[1].count);
  const fRows=frames.map(([name,v])=>`<div class="stats-row"><div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:500;">${name}</div></div><div style="text-align:right;flex-shrink:0;"><div style="font-size:13px;font-weight:500;">${v.count}개</div><div style="font-size:11px;color:var(--text-hint);">₩${formatPrice(v.revenue)}</div></div></div>`).join('');
  const lRows=lenses.map(([name,v])=>`<div class="stats-row"><div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:500;">${name}</div></div><div style="text-align:right;flex-shrink:0;"><div style="font-size:13px;font-weight:500;">${v.count%1===0?v.count:v.count.toFixed(1)}세트</div><div style="font-size:11px;color:var(--text-hint);">₩${formatPrice(v.revenue)}</div></div></div>`).join('');
  return `<div class="section-label" style="margin-top:0;">프레임 판매 현황</div>
  <div class="card">${fRows||'<div style="font-size:13px;color:var(--text-hint);padding:8px 0;">데이터 없음</div>'}</div>
  <div class="section-label">렌즈 판매 현황</div>
  <div class="card">${lRows||'<div style="font-size:13px;color:var(--text-hint);padding:8px 0;">데이터 없음</div>'}</div>`;
}

    filtered.forEach(p=>{
      if(p.lens_item){const q=parseFloat(p.lens_qty_a||1);lensMap[p.lens_item]=lensMap[p.lens_item]||{count:0};lensMap[p.lens_item].count+=q;}
      if(p.lens_item_b){const q=parseFloat(p.lens_qty_b||1);lensMap[p.lens_item_b]=lensMap[p.lens_item_b]||{count:0};lensMap[p.lens_item_b].count+=q;}
    });
    const frameRows=Object.entries(frameMap).sort((a,b)=>b[1].count-a[1].count).map(([name,v])=>({'구분':'프레임','상품명':name,'판매수량':v.count}));
    const lensRows=Object.entries(lensMap).sort((a,b)=>b[1].count-a[1].count).map(([name,v])=>({'구분':'렌즈','상품명':name,'판매수량':v.count}));
    rows=[...frameRows,...lensRows];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),sheetName);
    // 요약 시트
    const totalAmt=filtered.reduce((s,p)=>s+parsePrice(p.final_price||p.price),0);
    const summary=[{'기간':from+' ~ '+to,'판매건수':filtered.length,'총매출(원)':totalAmt}];
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(summary),'요약');
    XLSX.writeFile(wb,'OOG_기간판매_'+from+'_'+to+'.xlsx');
    return;
  }else if(statsTab==='ranking'){
    sheetName='고객순위';
    const cuTotal={};purchases.forEach(p=>{if(!p.customer_id)return;cuTotal[p.customer_id]=(cuTotal[p.customer_id]||0)+parsePrice(p.final_price||p.price);});
    rows=Object.keys(cuTotal).map(id=>({id,total:cuTotal[id],cu:cuMap[id]||null})).sort((a,b)=>b.total-a.total)
      .map((r,i)=>({'순위':i+1,'고객명':r.cu?r.cu.name:'알 수 없음','총구매금액(원)':r.total,'구매건수':purchases.filter(p=>p.customer_id===r.id).length}));
  }else if(statsTab==='margin'){
    sheetName='원가마진분석';
    const purchases2=_statsData.purchases||[];
    let filtered2=purchases2.filter(p=>p.date);
    if(_marginSub==='daily'){const prefix=new Date().toISOString().slice(0,7);filtered2=filtered2.filter(p=>p.date.startsWith(prefix));}
    else if(_marginSub==='period'){filtered2=filtered2.filter(p=>p.date>=_periodFrom&&p.date<=_periodTo);}
    const groups2={};
    filtered2.forEach(p=>{
      const k=_marginSub==='daily'?p.date.slice(0,10):_marginSub==='yearly'?p.date.slice(0,4):_marginSub==='period'?p.date.slice(0,10):p.date.slice(0,7);
      if(!groups2[k])groups2[k]={sales:0,cost:0,cnt:0};
      groups2[k].sales+=parsePrice(p.final_price||p.price);
      groups2[k].cost+=parsePrice(p.cost_total||0);
      groups2[k].cnt+=1;
    });
    rows=Object.keys(groups2).sort().reverse().map(k=>{
      const g=groups2[k];const margin=g.sales-g.cost;const rate=g.sales>0?Math.round(margin/g.sales*100):0;
      return {'기간':k,'매출(원)':g.sales,'원가(원)':g.cost,'마진(원)':margin,'마진율(%)':rate,'판매건수':g.cnt};
    });
  }else if(statsTab==='products'){
    sheetName='상품별판매';
    const frameMap={},lensMap={};
    purchases.forEach(p=>{
      if(p.frame_item){frameMap[p.frame_item]=frameMap[p.frame_item]||{count:0,revenue:0};frameMap[p.frame_item].count+=1;frameMap[p.frame_item].revenue+=parsePrice(p.frame_price||0);}
      if(p.frame_item_b){frameMap[p.frame_item_b]=frameMap[p.frame_item_b]||{count:0,revenue:0};frameMap[p.frame_item_b].count+=1;frameMap[p.frame_item_b].revenue+=parsePrice(p.frame_price_b||0);}
      if(p.lens_item){const q=parseFloat(p.lens_qty_a||1);lensMap[p.lens_item]=lensMap[p.lens_item]||{count:0,revenue:0};lensMap[p.lens_item].count+=q;lensMap[p.lens_item].revenue+=parsePrice(p.lens_price||0)*q;}
      if(p.lens_item_b){const q=parseFloat(p.lens_qty_b||1);lensMap[p.lens_item_b]=lensMap[p.lens_item_b]||{count:0,revenue:0};lensMap[p.lens_item_b].count+=q;lensMap[p.lens_item_b].revenue+=parsePrice(p.lens_price_b||0)*q;}
    });
    const fRows=Object.entries(frameMap).sort((a,b)=>b[1].count-a[1].count).map(([name,v])=>({'구분':'프레임','상품명':name,'판매수량':v.count,'매출(원)':v.revenue}));
    const lRows=Object.entries(lensMap).sort((a,b)=>b[1].count-a[1].count).map(([name,v])=>({'구분':'렌즈','상품명':name,'판매수량':v.count%1===0?v.count:v.count.toFixed(1)+'조','매출(원)':v.revenue}));
    rows=[...fRows,...lRows];
  }

  if(!rows.length){alert('다운로드할 데이터가 없습니다.');return;}
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),sheetName);
  XLSX.writeFile(wb,'OOG_'+sheetName+'_'+new Date().toISOString().split('T')[0]+'.xlsx');
}

async function openDetailFromStats(id){
  const {data:cuList}=await sb.from('customers').select('*');
  if(cuList)customers=cuList;
  currentCustomer=customers.find(c=>c.id===id);if(!currentCustomer)return;
  const [{data:exams},{data:purchases}]=await Promise.all([
    sb.from('exams').select('*').eq('customer_id',id).order('date',{ascending:true}),
    sb.from('purchases').select('*').eq('customer_id',id).order('date',{ascending:true})
  ]);
  currentCustomer.exams=exams||[];currentCustomer.purchases=purchases||[];
  currentTab=0;showingDetail=true;
  document.getElementById('tab-bar').style.display='flex';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===0));
  renderDetail(currentCustomer);
}

init();
