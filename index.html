<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#E7E7E7;--surface:#fff;--border:#D0D0D0;--accent:#FF2400;--text-primary:#1a1a1a;--text-secondary:#6b6b6b;--text-hint:#9b9b9b;--pad:16px;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);}
.app{display:flex;flex-direction:column;min-height:100svh;background:var(--bg);}
.nav{background:var(--surface)!important;border-bottom:0.5px solid var(--border);display:flex;align-items:center;height:52px;padding:0 var(--pad);flex-shrink:0;}
.nav-left{display:flex;align-items:center;min-width:80px;}
.nav-center{flex:1;display:flex;align-items:center;justify-content:center;}
.nav-title{font-size:17px;font-weight:500;color:var(--text-primary);}
.nav-right{display:flex;align-items:center;justify-content:flex-end;min-width:80px;gap:6px;}
.nav-btn{background:#FF2400!important;color:#fff!important;border:none!important;border-radius:8px!important;font-size:13px!important;font-weight:500!important;padding:7px 12px!important;cursor:pointer!important;display:inline-flex!important;align-items:center!important;gap:4px!important;white-space:nowrap!important;outline:none!important;-webkit-appearance:none!important;}
.nav-btn:hover{background:#e01f00!important;}
.nav-btn:active{opacity:0.8!important;}
.nav-btn.secondary{background:#f0f0f0!important;color:#1a1a1a!important;}
.nav-btn.secondary:hover{background:#e0e0e0!important;}
.tab-bar{display:flex;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.tab{flex:1!important;padding:11px 0!important;font-size:12px!important;text-align:center!important;cursor:pointer!important;border:none!important;border-bottom:2px solid transparent!important;background:#fff!important;color:#1a1a1a!important;outline:none!important;-webkit-appearance:none!important;}
.tab.active{color:#1a1a1a!important;border-bottom:2px solid #FF2400!important;font-weight:500!important;}
.tab:hover{background:#f5f5f5!important;}
.content{flex:1;overflow:auto;padding:var(--pad);}
.search-bar{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:15px;width:100%;color:var(--text-primary);margin-bottom:10px;}
.customer-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:14px var(--pad);margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;}
.customer-card:active{opacity:0.7;}
.avatar{width:42px;height:42px;border-radius:50%;background:#FFE8E5;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:#c41c00;flex-shrink:0;}
.avatar.female{background:#f5e8ff;color:#6b2fa0;}
.cname{font-size:15px;font-weight:500;color:var(--text-primary);}
.cmeta{font-size:12px;color:var(--text-secondary);margin-top:2px;}
.cbadge{font-size:11px;background:#FFE8E5;color:#c41c00;padding:2px 8px;border-radius:99px;}
.section-label{font-size:11px;color:var(--text-hint);font-weight:500;letter-spacing:0.06em;margin:18px 0 8px;text-transform:uppercase;}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:var(--pad);margin-bottom:12px;}
.field-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid #EBEBEB;}
.field-row:last-child{border-bottom:none;}
.field-label{font-size:13px;color:var(--text-secondary);}
.field-value{font-size:13px;color:var(--text-primary);font-weight:500;text-align:right;max-width:60%;}
.chart-wrap{position:relative;width:100%;height:200px;margin-top:8px;}
.chart-legend{display:flex;gap:16px;margin-bottom:8px;font-size:12px;color:var(--text-secondary);}
.legend-dot{width:10px;height:3px;border-radius:2px;display:inline-block;}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.metric{background:#F5F5F5;border-radius:10px;padding:12px;}
.metric-label{font-size:12px;color:var(--text-secondary);margin-bottom:4px;}
.metric-value{font-size:22px;font-weight:500;color:var(--text-primary);}
.metric-sub{font-size:11px;color:var(--text-hint);}
.action-btn{border:0.5px solid var(--border)!important;background:#fff!important;border-radius:10px!important;padding:11px var(--pad)!important;font-size:14px!important;color:#1a1a1a!important;cursor:pointer!important;width:100%!important;margin-bottom:8px!important;text-align:left!important;display:block!important;-webkit-appearance:none!important;outline:none!important;}
.action-btn:active{opacity:0.6!important;}
.action-btn.primary{background:#FF2400!important;color:#fff!important;border-color:#FF2400!important;}
.action-btn.danger{background:#fff!important;color:#FF2400!important;border-color:#FF2400!important;}
.msg-box{background:#F5F5F5;border:0.5px solid var(--border);border-radius:10px;padding:var(--pad);font-size:13px;color:var(--text-primary);line-height:1.75;margin-bottom:10px;white-space:pre-wrap;}
.tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:99px;margin-right:4px;margin-bottom:4px;}
.tag.blue{background:#FFE8E5;color:#c41c00;}
.tag.green{background:#F0F7EC;color:#2d5a1b;}
.tag.amber{background:#FFF4E0;color:#7a4800;}
.form-row{margin-bottom:12px;}
.form-label{font-size:12px;color:var(--text-secondary);margin-bottom:4px;}
.form-input{width:100%;background:#F5F5F5;border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text-primary);-webkit-appearance:none;appearance:none;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.eye-table{width:100%;font-size:12px;border-collapse:collapse;}
.eye-table th{color:var(--text-secondary);font-weight:500;padding:6px 8px;text-align:center;background:#F5F5F5;}
.eye-table td{padding:6px 8px;text-align:center;border-bottom:0.5px solid #EBEBEB;color:var(--text-primary);}
.sort-bar{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;}
.sort-bar::-webkit-scrollbar{display:none;}
.sort-btn{flex-shrink:0;border:0.5px solid var(--border)!important;background:#fff!important;border-radius:20px!important;padding:6px 13px!important;font-size:12px!important;color:var(--text-secondary)!important;cursor:pointer!important;white-space:nowrap!important;-webkit-appearance:none!important;outline:none!important;}
.sort-btn.active{background:#1a1a1a!important;color:#fff!important;border-color:#1a1a1a!important;font-weight:500!important;}
.sort-btn:hover:not(.active){background:#f0f0f0!important;}
.index-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
.idx-btn{border:0.5px solid var(--border)!important;background:#fff!important;border-radius:6px!important;padding:5px 9px!important;font-size:12px!important;color:var(--text-secondary)!important;cursor:pointer!important;-webkit-appearance:none!important;outline:none!important;font-weight:500!important;min-width:32px!important;text-align:center!important;}
.idx-btn.active{background:#FF2400!important;color:#fff!important;border-color:#FF2400!important;}
.idx-btn:hover:not(.active){background:#f0f0f0!important;}
.section-divider{font-size:11px;color:var(--text-hint);font-weight:600;letter-spacing:0.08em;padding:6px 2px 4px;margin-top:4px;}
.edit-btn{border:0.5px solid var(--border)!important;background:#fff!important;border-radius:7px!important;padding:4px 10px!important;font-size:11px!important;color:var(--text-secondary)!important;cursor:pointer!important;-webkit-appearance:none!important;outline:none!important;flex-shrink:0;}
.edit-btn:active{opacity:0.6!important;}
.alarm-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:14px var(--pad);margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;}
.alarm-card:active{opacity:0.7;}
.alarm-badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;flex-shrink:0;}
.alarm-badge.week{background:#FFF4E0;color:#7a4800;}
.alarm-badge.month{background:#FFE8E5;color:#c41c00;}
.alarm-badge.year{background:#F0F7EC;color:#2d5a1b;}
.alarm-filter-bar{display:flex;gap:6px;margin-bottom:12px;}
.alarm-filter-btn{flex:1;border:0.5px solid var(--border)!important;background:#fff!important;border-radius:20px!important;padding:7px 0!important;font-size:12px!important;color:var(--text-secondary)!important;cursor:pointer!important;text-align:center!important;-webkit-appearance:none!important;outline:none!important;}
.alarm-filter-btn.active{background:#1a1a1a!important;color:#fff!important;border-color:#1a1a1a!important;font-weight:500!important;}
/* 로그인 화면 */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100svh;background:var(--bg);padding:32px var(--pad);}
.login-card{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:360px;border:0.5px solid var(--border);}
.login-logo{display:block;height:36px;margin:0 auto 24px;}
.login-title{font-size:18px;font-weight:600;color:var(--text-primary);text-align:center;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text-secondary);text-align:center;margin-bottom:24px;}
.login-error{font-size:12px;color:#FF2400;text-align:center;margin-top:8px;min-height:18px;}
/* 로딩 */
.spinner{width:24px;height:24px;border:2px solid #eee;border-top:2px solid #FF2400;border-radius:50%;animation:spin .7s linear infinite;margin:40px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
/* 관리자 패널 */
.admin-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid #EBEBEB;}
.admin-row:last-child{border-bottom:none;}
.admin-name{font-size:14px;font-weight:500;color:var(--text-primary);}
.admin-email{font-size:12px;color:var(--text-secondary);margin-top:2px;}
.chip{font-size:10px;padding:2px 8px;border-radius:99px;background:#FFE8E5;color:#c41c00;font-weight:500;}
</style>
</head>

// ────────────────────────────────────────
// 인증
// ────────────────────────────────────────
async function init(){
  const {data:{session}} = await sb.auth.getSession();
  if(session){
    currentUser = session.user;
    showApp();
  } else {
    showLogin();
  }
  sb.auth.onAuthStateChange((_,session)=>{
    if(session){currentUser=session.user;showApp();}
    else{showLogin();}
  });
}

function showLogin(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app-screen').style.display='none';
}

function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='flex';
  renderList();
}

async function renderList(){
  showingDetail=false;destroyCharts();
  setNav(false,'','+ 신규',showNewCustomerForm);
  document.getElementById('tab-bar').style.display='none';
  document.getElementById('main-content').innerHTML=`
    <input class="search-bar" placeholder="고객 이름 또는 연락처 검색..." oninput="applyListFilter()" id="search-input">
    <div class="sort-bar">
      <button class="sort-btn active" id="sort-default" onclick="setSort('default')">기본순</button>
      <button class="sort-btn" id="sort-name" onclick="setSort('name')">가나다순</button>
      <button class="sort-btn" id="sort-visit" onclick="setSort('visit')">최근방문순</button>
      <button class="sort-btn" id="sort-count" onclick="setSort('count')">방문횟수순</button>
    </div>
    <div class="index-bar" id="index-bar"></div>
    <div id="customer-list"><div class="spinner"></div></div>`;
  customers = await loadCustomers();
  try{ await loadAlarmDone(); }catch(e){}
  buildIndexBar();
  applyListFilter();
  updateAlarmBadge();
}

async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent='';
  if(!email||!pw){errEl.textContent='이메일과 비밀번호를 입력해주세요.';return;}
  const btn = document.querySelector('#login-screen .action-btn');
  btn.textContent='로그인 중...'; btn.disabled=true;
  const {error} = await sb.auth.signInWithPassword({email,password:pw});
  btn.textContent='로그인'; btn.disabled=false;
  if(error) errEl.textContent='이메일 또는 비밀번호가 올바르지 않습니다.';
}

async function doLogout(){
  await sb.auth.signOut();
}

function goBack(){currentCustomer=null;showingDetail=false;currentTab=0;renderList();}
function destroyCharts(){charts.forEach(c=>{try{c.destroy();}catch(e){}});charts=[];}
function switchTab(t){
  if(!showingDetail)return;
  currentTab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===t));
  renderDetail(currentCustomer);
}

// 고객 목록
// ────────────────────────────────────────
async function loadCustomers(){
  const {data,error}=await sb.from('customers').select('*').order('created_at',{ascending:true});
  if(error){console.error(error);return[];}
  // exams/purchases는 별도 로드
  return data||[];
}


const INITIALS=['전체','ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function getInitial(name){
  const code=name.charCodeAt(0)-0xAC00;
  if(code<0||code>11171)return name[0];
  return ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'][Math.floor(code/28/21)];
}
function getNormInitial(ch){return {'ㄲ':'ㄱ','ㄸ':'ㄷ','ㅃ':'ㅂ','ㅆ':'ㅅ','ㅉ':'ㅈ'}[ch]||ch;}
function buildIndexBar(){
  const bar=document.getElementById('index-bar');if(!bar)return;
  const used=new Set(customers.map(c=>getNormInitial(getInitial(c.name))));
  const btns=['전체',...INITIALS.slice(1).filter(i=>used.has(i))];
  bar.innerHTML=btns.map(i=>`<button class="idx-btn${currentIndex===i?' active':''}" onclick="setIndex('${i}')">${i}</button>`).join('');
}
function setSort(s){
  currentSort=s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('sort-'+s);if(el)el.classList.add('active');
  applyListFilter();
}
function setIndex(i){
  currentIndex=i;
  document.querySelectorAll('.idx-btn').forEach(b=>b.classList.toggle('active',b.textContent.trim()===i));
  applyListFilter();
}
function applyListFilter(){
  const q=(document.getElementById('search-input')||{}).value||'';
  let list=customers.filter(c=>c.name.includes(q)||(c.phone||'').includes(q));
  if(currentIndex!=='전체')list=list.filter(c=>getNormInitial(getInitial(c.name))===currentIndex);
  if(currentSort==='name')list=[...list].sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  else if(currentSort==='visit')list=[...list].sort((a,b)=>(b.last_visit||'').localeCompare(a.last_visit||''));
  else if(currentSort==='count')list=[...list].sort((a,b)=>b.visits-a.visits);
  renderCustomerCards(list);
}
function renderCustomerCards(list){
  const el=document.getElementById('customer-list');if(!el)return;
  if(!list.length){el.innerHTML=`<div style="text-align:center;padding:40px 0;color:var(--text-hint);font-size:14px;">고객이 없습니다</div>`;return;}
  let html='',lastInit='';
  list.forEach(cu=>{
    if(currentSort==='name'){
      const init=getNormInitial(getInitial(cu.name));
      if(init!==lastInit){html+=`<div class="section-divider">${init}</div>`;lastInit=init;}
    }
    html+=`<div class="customer-card" onclick="openDetail('${cu.id}')">
      <div class="avatar ${cu.gender==='female'?'female':''}">${cu.name[0]}</div>
      <div style="flex:1;min-width:0;">
        <div class="cname">${cu.name}</div>
        <div class="cmeta">${cu.phone||'—'} · 최근방문 ${cu.last_visit||'—'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="cbadge">방문 ${cu.visits||0}회</div>
        <svg width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1l5 5-5 5" stroke="#C0C0C0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

// ────────────────────────────────────────
// 고객 상세
// ────────────────────────────────────────
async function openDetail(id){
  currentCustomer=customers.find(c=>c.id===id);
  if(!currentCustomer)return;
  // 검안/구매 로드
  const [{data:exams},{data:purchases}]=await Promise.all([
    sb.from('exams').select('*').eq('customer_id',id).order('date',{ascending:true}),
    sb.from('purchases').select('*').eq('customer_id',id).order('date',{ascending:true})
  ]);
  currentCustomer.exams=exams||[];
  currentCustomer.purchases=purchases||[];
  currentTab=0;showingDetail=true;
  document.getElementById('tab-bar').style.display='flex';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===0));
  renderDetail(currentCustomer);
}

function renderDetail(cu){
  destroyCharts();
  if(currentTab===0)     {setNav(true,cu.name,'',null);              renderInfoTab(cu);}
  else if(currentTab===1){setNav(true,cu.name,'+ 검안기록',showExamForm); renderExamTab(cu);}
  else if(currentTab===2){setNav(true,cu.name,'+ 구매',showPurchaseForm); renderPurchaseTab(cu);}
  else                   {setNav(true,cu.name,'',null);              renderMessageTab(cu);}
}

// 부호 처리 헬퍼
function applyMinus(v){ // 기본 (-)부호, 직접 +로 시작하면 그대로
  if(!v) return null;
  if(v.startsWith('+') || v.startsWith('-')) return v;
  return '-'+v;
}
function applyCyl(v){ // C(원주)는 무조건 (-)
  if(!v) return null;
  return '-'+v.replace(/^[+-]/,'');
}
function applyPlus(v){ // ADD는 무조건 (+)
  if(!v) return null;
  return '+'+v.replace(/^[+-]/,'');
}

async function saveExam(){
  const cu=currentCustomer;
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim()||null:null;};
  const examDate=g('exam-date')||new Date().toISOString().split('T')[0];
  const newExam={
    customer_id:cu.id, date:examDate,
    re_va:g('re-va'), le_va:g('le-va'),
    re_sph:applyMinus(g('re-sph')), re_cyl:applyCyl(g('re-cyl')), re_ax:g('re-ax'),
    le_sph:applyMinus(g('le-sph')), le_cyl:applyCyl(g('le-cyl')), le_ax:g('le-ax'),
    add_power:applyPlus(g('add-power')),
    phoria_far:g('phoria-far'), phoria_near:g('phoria-near'),
    vergence_far:g('vergence-far'), vergence_near:g('vergence-near'),
    accommodation_re:g('acc-re'), accommodation_le:g('acc-le'), accommodation_both:g('acc-both'),
    facility_re:g('fac-re'), facility_le:g('fac-le'), facility_both:g('fac-both'),
    npc:g('npc'), pd:g('pd'),
    comment:g('exam-comment')
  };
  const {data,error}=await sb.from('exams').insert(newExam).select().single();
  if(error){alert('저장 실패: '+error.message);return;}
  cu.exams.push(data);
  cu.exams.sort((a,b)=>a.date.localeCompare(b.date));
  await updateLastVisit(cu, examDate);
  renderExamTab(cu);
}

async function saveExamEdit(idx){
  const cu=currentCustomer;
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim()||null:null;};

    date:g(`ee-date-${idx}`),
    re_va:g(`ee-re-va-${idx}`), le_va:g(`ee-le-va-${idx}`),
    re_sph:applyMinus(g(`ee-re-sph-${idx}`)), re_cyl:applyCyl(g(`ee-re-cyl-${idx}`)), re_ax:g(`ee-re-ax-${idx}`),
    le_sph:applyMinus(g(`ee-le-sph-${idx}`)), le_cyl:applyCyl(g(`ee-le-cyl-${idx}`)), le_ax:g(`ee-le-ax-${idx}`),
    add_power:applyPlus(g(`ee-add-${idx}`)),
    phoria_far:g(`ee-phoria-far-${idx}`), phoria_near:g(`ee-phoria-near-${idx}`),
    vergence_far:g(`ee-vergence-far-${idx}`), vergence_near:g(`ee-vergence-near-${idx}`),
    accommodation_re:g(`ee-acc-re-${idx}`), accommodation_le:g(`ee-acc-le-${idx}`), accommodation_both:g(`ee-acc-both-${idx}`),
    facility_re:g(`ee-fac-re-${idx}`), facility_le:g(`ee-fac-le-${idx}`), facility_both:g(`ee-fac-both-${idx}`),
    npc:g(`ee-npc-${idx}`), pd:g(`ee-pd-${idx}`),
    comment:g(`ee-comment-${idx}`)
  };
  const {error}=await sb.from('exams').update(updates).eq('id',cu.exams[idx].id);

  Object.assign(cu.exams[idx],updates);

  renderExamTab(cu);
}

async function deleteExam(idx){
  if(!confirm('이 검안기록을 삭제할까요?'))return;
  const cu=currentCustomer;

  cu.exams.splice(idx,1);

async function updateLastVisit(cu, candidateDate){
  const allDates=[...cu.exams.map(e=>e.date),...cu.purchases.map(p=>p.date)].filter(Boolean);
  const lastVisit=allDates.length?allDates.sort().reverse()[0]:candidateDate;
  await sb.from('customers').update({last_visit:lastVisit}).eq('id',cu.id);
  cu.last_visit=lastVisit;
  const cidx=customers.findIndex(c=>c.id===cu.id);
  if(cidx>=0)customers[cidx].last_visit=lastVisit;
}

function genMsg(type,name,extra){
  const t={
    review:`안녕하세요, ${name} 고객님 :)\n\n저희 안경원을 방문해 주셔서 감사합니다.\n불편하신 점은 없으신가요?\n\n시간이 괜찮으시다면 네이버 지도에 방문 리뷰를 남겨주시면 큰 힘이 됩니다!\n\n[네이버 지도 리뷰 남기기]\nhttps://naver.me/xxxxx\n\n언제든지 궁금한 점은 편하게 연락 주세요. 감사합니다!`,
    checkup:`안녕하세요, ${name} 고객님 :)\n\n마지막 검안으로부터 시간이 조금 지났습니다.\n시력 변화는 없으신가요?\n\n불편함이 없더라도 정기적인 시력 검사를 권장드립니다.\n예약 없이 편하게 방문해 주세요!\n\n문의: 031-xxx-xxxx`,
    custom:`안녕하세요, ${name} 고객님!\n\n최근 처방받으신 안경은 잘 맞으시나요?\n우안 ${extra.split('/')[0]}, 좌안 ${extra.split('/')[1]} 기준으로 처방해 드렸는데\n어지럽거나 불편하신 점이 있으시면 언제든 방문해 주세요!\n\n항상 편안한 시력을 위해 최선을 다하겠습니다 :)`
  };
  document.getElementById('msg-output').innerHTML=`
    <div class="msg-box" id="msg-text">${t[type].replace(/\n/g,'\n')}</div>
    <button class="action-btn" onclick="copyMsg()">복사하기</button>`;
}
function copyMsg(){
  const text=document.getElementById('msg-text').innerText;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.querySelector('#msg-output .action-btn');
    btn.textContent='복사 완료!';setTimeout(()=>{btn.textContent='복사하기';},2000);
  }).catch(()=>{alert(text);});
}

    return;
  }
  if(!data||!data.length){el.innerHTML=`<div style="font-size:13px;color:var(--text-hint);padding:4px 0;">등록된 직원이 없습니다.</div>`;return;}
  el.innerHTML=data.map(s=>`
    <div class="admin-row">
      <div>
        <div class="admin-name">${s.name||'이름 없음'}</div>
        <div class="admin-email">${s.email}</div>
      </div>
    </div>`).join('');
}

function showAddStaffForm(){
  const area=document.getElementById('add-staff-area');if(!area)return;
  if(area.innerHTML){area.innerHTML='';return;}
  area.innerHTML=`
    <div class="card" style="border:0.5px solid #FF2400;margin-bottom:12px;">
      <div style="font-size:13px;font-weight:500;color:#FF2400;margin-bottom:12px;">새 직원 계정 추가</div>
      <div class="form-row"><div class="form-label">이름</div><input class="form-input" id="staff-name" placeholder="홍길동"></div>
      <div class="form-row"><div class="form-label">이메일</div><input class="form-input" type="email" id="staff-email" placeholder="staff@email.com"></div>
      <div class="form-row"><div class="form-label">임시 비밀번호</div><input class="form-input" type="password" id="staff-pw" placeholder="8자 이상"></div>
      <button class="action-btn primary" onclick="addStaff()" style="margin-top:8px;margin-bottom:0;">계정 생성</button>
      <div id="staff-msg" style="font-size:12px;margin-top:8px;color:#FF2400;"></div>

async function addStaff(){
  const name=document.getElementById('staff-name').value.trim();
  const email=document.getElementById('staff-email').value.trim();
  const pw=document.getElementById('staff-pw').value;
  const msg=document.getElementById('staff-msg');
  if(!email||!pw){msg.textContent='이메일과 비밀번호를 입력해주세요.';return;}
  if(pw.length<8){msg.textContent='비밀번호는 8자 이상이어야 합니다.';return;}
  msg.textContent='계정 생성 중...';
  // Supabase Auth 계정 생성 (signUp은 이메일 확인 없이 사용 가능)
  const {data:authData,error:authErr}=await sb.auth.signUp({email,password:pw});
  if(authErr){msg.textContent='오류: '+authErr.message;return;}
  // staff 테이블에도 기록
  await sb.from('staff').insert({email,name,id:authData.user?.id});
  msg.style.color='#2d5a1b';
  msg.textContent=`✓ ${email} 계정이 생성되었습니다. 직원에게 임시 비밀번호를 전달해주세요.`;
  loadStaffList();
}

async function exportExcel(){
  const btn=document.querySelectorAll('.action-btn')[0];
  // 전체 고객 + 검안/구매 로드
  const {data:cuList}=await sb.from('customers').select('*').order('created_at');
  const {data:exams}=await sb.from('exams').select('*');
  const {data:purchases}=await sb.from('purchases').select('*');

  // 고객 시트
  const cuRows=(cuList||[]).map(c=>({
    고객ID:c.id, 이름:c.name, 성별:c.gender==='female'?'여성':'남성',
    생년월일:c.birth||'', 연락처:c.phone||'', 이메일:c.email||'',
    주소:c.address||'', 방문횟수:c.visits||0, 최근방문:c.last_visit||''
  }));
  // 검안 시트
  const exRows=(exams||[]).map(e=>({
    고객ID:e.customer_id, 검사일:e.date,
    우안시력:e.re_va, 좌안시력:e.le_va,
    우안S:e.re_sph, 우안C:e.re_cyl, 우안AX:e.re_ax,
    좌안S:e.le_sph, 좌안C:e.le_cyl, 좌안AX:e.le_ax,
    NPC:e.npc, 입체시:e.stereo, PD:e.pd
  }));
  // 구매 시트
  const puRows=(purchases||[]).map(p=>({
    고객ID:p.customer_id, 구매일:p.date, 품목:p.item, 금액:p.price, 렌즈처방:p.lens
  }));

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(cuRows),'고객목록');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(exRows),'검안기록');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(puRows),'구매내역');
  const date=new Date().toISOString().split('T')[0];
  XLSX.writeFile(wb,`OOG_고객데이터_${date}.xlsx`);
}

async function importExcel(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const ws=wb.Sheets['고객목록'];
      if(!ws){alert('고객목록 시트를 찾을 수 없습니다.');return;}
      const rows=XLSX.utils.sheet_to_json(ws);
      if(!rows.length){alert('데이터가 없습니다.');return;}
      if(!confirm(`${rows.length}명의 고객 데이터를 가져올까요? 중복 이름의 경우 새로 추가됩니다.`))return;
      const toInsert=rows.map(r=>({
        name:r['이름']||'이름없음',
        gender:r['성별']==='여성'?'female':'male',
        birth:r['생년월일']||null,
        phone:String(r['연락처']||''),
        email:r['이메일']||null,
        address:r['주소']||null,
        visits:parseInt(r['방문횟수'])||0,
        last_visit:r['최근방문']||null
      }));
      const {error}=await sb.from('customers').insert(toInsert);
      if(error){alert('가져오기 실패: '+error.message);return;}
      alert(`${toInsert.length}명 가져오기 완료!`);
      renderList();
    }catch(err){alert('파일 읽기 실패: '+err.message);}
  };
  reader.readAsBinaryString(file);
}

// ────────────────────────────────────────
// 알림 페이지
// ────────────────────────────────────────
let alarmFilter = 'all';
let alarmDoneSet = new Set();

function calcAlarms(customerList){
  const today = new Date();
  today.setHours(0,0,0,0);
  const alarms = [];
  customerList.forEach(cu => {
    if(!cu.last_visit) return;
    const base = new Date(cu.last_visit);
    base.setHours(0,0,0,0);
    const diff = Math.round((today - base) / (1000*60*60*24));
    const key = (type) => `${cu.id}_${type}_${cu.last_visit}`;
    // 자동 소멸 윈도우 + 완료 체크 필터
    if(diff >= 5  && diff <= 9   && !alarmDoneSet.has(key('week')))
      alarms.push({cu, type:'week',  label:'1주일', diff, key:key('week')});
    if(diff >= 27 && diff <= 33  && !alarmDoneSet.has(key('month')))
      alarms.push({cu, type:'month', label:'1개월', diff, key:key('month')});
    if(diff >= 358 && diff <= 372 && !alarmDoneSet.has(key('year')))
      alarms.push({cu, type:'year',  label:'1년',   diff, key:key('year')});
  });
  alarms.sort((a,b) => b.diff - a.diff);
  return alarms;
}

async function loadAlarmDone(){
  const {data} = await sb.from('alarm_done').select('customer_id,alarm_type,base_date');
  alarmDoneSet = new Set((data||[]).map(r=>`${r.customer_id}_${r.alarm_type}_${r.base_date}`));
}

function updateAlarmBadge(){
  const alarms = calcAlarms(customers);
  const badge = document.getElementById('alarm-badge');
  if(badge) badge.style.display = alarms.length ? 'block' : 'none';
}

async function showAlarmPage(){
  showingDetail=false; destroyCharts();
  document.getElementById('tab-bar').style.display='none';
  setNav(true,'알림','',null);
  document.getElementById('main-content').innerHTML=`<div class="spinner"></div>`;
  const {data:cuData} = await sb.from('customers').select('*').order('created_at',{ascending:true});
  if(cuData) customers = cuData;
  await loadAlarmDone();
  const alarms = calcAlarms(customers);
  renderAlarmPage(alarms);
}

function renderAlarmPage(alarms){
  const filtered = alarmFilter==='all' ? alarms : alarms.filter(a=>a.type===alarmFilter);
  const hasAny = alarms.length > 0;

  document.getElementById('main-content').innerHTML=`
    <div class="alarm-filter-bar">
      <button class="alarm-filter-btn${alarmFilter==='all'?' active':''}" onclick="setAlarmFilter('all')">전체 ${alarms.length}</button>
      <button class="alarm-filter-btn${alarmFilter==='week'?' active':''}" onclick="setAlarmFilter('week')">1주일 ${alarms.filter(a=>a.type==='week').length}</button>
      <button class="alarm-filter-btn${alarmFilter==='month'?' active':''}" onclick="setAlarmFilter('month')">1개월 ${alarms.filter(a=>a.type==='month').length}</button>
      <button class="alarm-filter-btn${alarmFilter==='year'?' active':''}" onclick="setAlarmFilter('year')">1년 ${alarms.filter(a=>a.type==='year').length}</button>
    </div>
    ${hasAny ? `<button class="action-btn" onclick="markAllDone()" style="margin-bottom:12px;text-align:center;color:#FF2400;border-color:#FF2400;">전체 연락완료 처리</button>` : ''}
    ${filtered.length ? filtered.map(a=>`
      <div class="alarm-card" id="alarm-${a.key.replace(/[^a-z0-9]/gi,'_')}">
        <div class="avatar ${a.cu.gender==='female'?'female':''}" onclick="openDetailFromAlarm('${a.cu.id}')" style="cursor:pointer;">${a.cu.name[0]}</div>
        <div style="flex:1;min-width:0;" onclick="openDetailFromAlarm('${a.cu.id}')" style="cursor:pointer;">
          <div class="cname">${a.cu.name}</div>
          <div class="cmeta">최근방문 ${a.cu.last_visit} · ${a.diff}일 경과</div>
          <span class="alarm-badge ${a.type}" style="margin-top:4px;display:inline-block;">${a.label} 연락 필요</span>
        </div>
        <button class="edit-btn" onclick="markOneDone('${a.cu.id}','${a.type}','${a.cu.last_visit}','${a.key}')" style="color:#2d5a1b;border-color:#2d5a1b;white-space:nowrap;">연락완료 ✓</button>
      </div>`).join('')
    : `<div style="text-align:center;padding:60px 0 20px;">
        <div style="font-size:32px;margin-bottom:12px;">🎉</div>
        <div style="font-size:15px;font-weight:500;color:var(--text-primary);margin-bottom:6px;">연락할 고객이 없어요</div>
        <div style="font-size:13px;color:var(--text-hint);">모든 고객 관리가 잘 되고 있어요!</div>
      </div>`}
    <div style="height:20px;"></div>`;
}

function setAlarmFilter(f){
  alarmFilter = f;
  renderAlarmPage(calcAlarms(customers));
}

async function markOneDone(customerId, type, baseDate, key){
  // DB에 저장
  await sb.from('alarm_done').insert({customer_id:customerId, alarm_type:type, base_date:baseDate});
  alarmDoneSet.add(key);
  // 카드 애니메이션 후 제거
  const safeKey = key.replace(/[^a-z0-9]/gi,'_');
  const card = document.getElementById(`alarm-${safeKey}`);
  if(card){
    card.style.transition='opacity 0.3s';
    card.style.opacity='0';
    setTimeout(()=>{
      const alarms = calcAlarms(customers);
      renderAlarmPage(alarms);
      updateAlarmBadge();
    }, 300);
  }
}

async function markAllDone(){
  if(!confirm('현재 알림을 모두 연락완료 처리할까요?')) return;
  const alarms = calcAlarms(customers);
  if(!alarms.length) return;
  // 한번에 insert
  const rows = alarms.map(a=>({
    customer_id: a.cu.id,
    alarm_type: a.type,
    base_date: a.cu.last_visit
  }));
  await sb.from('alarm_done').insert(rows);
  alarms.forEach(a => alarmDoneSet.add(a.key));
  renderAlarmPage(calcAlarms(customers));
  updateAlarmBadge();
}

async function openDetailFromAlarm(id){
  const {data:cuList} = await sb.from('customers').select('*').order('created_at');
  if(cuList) customers = cuList;
  currentCustomer = customers.find(c=>c.id===id);
  if(!currentCustomer) return;
  const [{data:exams},{data:purchases}] = await Promise.all([
    sb.from('exams').select('*').eq('customer_id',id).order('date',{ascending:true}),
    sb.from('purchases').select('*').eq('customer_id',id).order('date',{ascending:true})
  ]);
  currentCustomer.exams = exams||[];
  currentCustomer.purchases = purchases||[];
  currentTab = 3;
  showingDetail = true;
  document.getElementById('tab-bar').style.display='flex';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===3));
  renderDetail(currentCustomer);
}
